<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, getDoc, getDocs, setDoc, addDoc, updateDoc, deleteDoc, collection, query, where, orderBy, limit, onSnapshot, serverTimestamp, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject, getBlob } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, EmailAuthProvider, reauthenticateWithCredential, updatePassword as fbUpdatePassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCsc6xD7mTAnSwPbz7iSGB9NjniFub97wY",
    authDomain: "promiand-app.firebaseapp.com",
    projectId: "promiand-app",
    storageBucket: "promiand-app.firebasestorage.app",
    messagingSenderId: "585556305161",
    appId: "1:585556305161:web:2752434736fd4a652c1fd8",
    measurementId: "G-E2SKN09Y6T"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);
  const auth = getAuth(app);
  try { getAnalytics(app); } catch(e) {}
  // FCM Messaging
  let _messaging = null;
  try { _messaging = getMessaging(app); window.FMESSAGING = _messaging; } catch(e) { console.warn('FCM 초기화 실패:', e); }
  window.FAUTH = auth;
  window.FB_createUser = (email, pw) => createUserWithEmailAndPassword(auth, email, pw);
  window.FB_signIn     = (email, pw) => signInWithEmailAndPassword(auth, email, pw);
  window.FB_signOut    = () => signOut(auth);
  window.FB_reauth     = (email, pw) => {
    const user = auth.currentUser;
    if (!user) throw new Error('not-logged-in');
    return reauthenticateWithCredential(user, EmailAuthProvider.credential(email, pw));
  };
  window.FB_updatePw   = (newPw) => {
    const user = auth.currentUser;
    if (!user) throw new Error('not-logged-in');
    return fbUpdatePassword(user, newPw);
  };

  // ── FCM 토큰 등록 ──
  window.registerFcmToken = async () => {
    if (!window.FMESSAGING) { console.warn('[FCM] FMESSAGING 없음'); return false; }
    if (typeof Notification === 'undefined') { console.warn('[FCM] Notification 미지원'); return false; }
    if (Notification.permission !== 'granted') { console.warn('[FCM] 권한 없음:', Notification.permission); return false; }
    if (!('serviceWorker' in navigator)) { console.warn('[FCM] SW 미지원'); return false; }
    if (!state?.user?.uid) { console.warn('[FCM] 유저 없음'); return false; }
    try {
      let sw;
      try {
        sw = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
        await navigator.serviceWorker.ready;
      } catch(swErr) {
        console.warn('[FCM] SW 등록 실패:', swErr.message);
        return false;
      }
      const token = await getToken(window.FMESSAGING, {
        vapidKey: 'BJ3imv5tyh8HpiX38GNH02LudQStbmuvi-XDp5nxNiASHAD_lv3mmeWF0DtDQIWoJqjYGuspEDtckCdEhwCqm80',
        serviceWorkerRegistration: sw
      });
      if (token) {
        await window.FDB.setDoc('users', state.user.uid, { fcmToken: token });
        state.user.fcmToken = token;
        SESSION.set(state.user);
        render();
        return true;
      }
      console.warn('[FCM] 토큰 발급 실패 - 빈 토큰');
      return false;
    } catch (e) {
      console.warn('[FCM] 오류:', e.code || e.message);
      return false;
    }
  };

  // 권한 요청 + 토큰 등록
  window.requestPushPermission = async () => {
    if (typeof Notification === 'undefined') return false;
    if (Notification.permission === 'denied') return false;
    try {
      const permission = Notification.permission === 'granted'
        ? 'granted'
        : await Notification.requestPermission();
      if (permission === 'granted') {
        return await window.registerFcmToken();
      }
      return false;
    } catch (e) {
      console.warn('푸시 권한 요청 실패:', e);
      return false;
    }
  };

  // 포그라운드 메시지 수신 - 네이티브 알림으로 표시
  if (window.FMESSAGING) {
    onMessage(window.FMESSAGING, (payload) => {
      const title = payload.notification?.title || '약속의 땅';
      const body = payload.notification?.body || '';
      // 브라우저 네이티브 알림 (포그라운드 상태에서도 시스템 알림 표시)
      if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
        new Notification(title, {
          body,
          icon: '/asset/logo.png',
          badge: '/asset/logo.png',
        });
      } else if (typeof showToast === 'function') {
        showToast('🔔 ' + title);
      }
    });
  }

  // ============================================================
  // FIREBASE DB LAYER
  // ============================================================
  window.FDB = {
    db, storage,

    // 실시간 리스너 — 컬렉션 이름(문자열) 또는 Firestore Query 객체
    listenCol(colNameOrQuery, onData) {
      const refOrQ = typeof colNameOrQuery === 'string'
        ? collection(db, colNameOrQuery)
        : colNameOrQuery;
      const label = typeof colNameOrQuery === 'string' ? colNameOrQuery : 'query';
      return onSnapshot(
        refOrQ,
        snap => onData(snap.docs.map(d => ({ ...d.data(), id: d.id }))),
        err => console.warn('onSnapshot', label, err)
      );
    },

    colQuery(colName, ...constraints) {
      return query(collection(db, colName), ...constraints);
    },

    recentDocsQuery(colName, field, direction, max) {
      return query(collection(db, colName), orderBy(field, direction), limit(max));
    },

    async getCol(col) {
      try {
        const snap = await getDocs(collection(db, col));
        return snap.docs.map(d => ({ ...d.data(), id: d.id }));
      } catch(e) { console.error('getCol', col, e); return []; }
    },

    async getDoc(col, id) {
      try {
        const snap = await getDoc(doc(db, col, id));
        return snap.exists() ? { ...snap.data(), id: snap.id } : null;
      } catch(e) { return null; }
    },

    async setDoc(col, id, data) {
      try {
        await setDoc(doc(db, col, id), { ...data, updatedAt: serverTimestamp() }, { merge: true });
      } catch(e) { console.error('setDoc', col, id, e); }
    },

    async addDoc(col, data) {
      try {
        const ref2 = await addDoc(collection(db, col), { ...data, createdAt: serverTimestamp() });
        return ref2.id;
      } catch(e) { console.error('addDoc', col, e); return null; }
    },

    /** 공지 하위 댓글 — 문서 id와 필드 id를 일치시켜 삭제가 가능하도록 함 */
    async setNoticeComment(noticeId, commentId, data) {
      try {
        await setDoc(doc(db, 'notices', noticeId, 'comments', commentId), { ...data, createdAt: serverTimestamp() });
      } catch(e) { console.error('setNoticeComment', noticeId, commentId, e); }
    },

    async setDocFull(col, id, data) {
      // merge 없이 전체 교체 (songs 배열 줄었을 때 등)
      try {
        await setDoc(doc(db, col, id), { ...data, updatedAt: serverTimestamp() });
      } catch(e) { console.error('setDocFull', col, id, e); }
    },

    /** 2인자: 최상위 문서 / 4인자: 하위 컬렉션 문서 (예: notices, nid, 'comments', cid) */
    async deleteDoc(a, b, c, d) {
      try {
        if (c !== undefined && d !== undefined) {
          await deleteDoc(doc(db, a, b, c, d));
        } else {
          await deleteDoc(doc(db, a, b));
        }
      } catch(e) { console.error('deleteDoc', a, b, c, d, e); }
    },

    async uploadFile(path, file) {
      try {
        const storageRef = ref(storage, path);
        await uploadBytes(storageRef, file);
        return await getDownloadURL(storageRef);
      } catch(e) { console.error('upload', e); return null; }
    },

    async uploadBase64(path, dataUrl) {
      try {
        const resp = await fetch(dataUrl);
        const blob = await resp.blob();
        const storageRef = ref(storage, path);
        await uploadBytes(storageRef, blob);
        return await getDownloadURL(storageRef);
      } catch(e) { console.error('uploadBase64', e); return null; }
    },

    async getSheetBlobFromUrl(url) {
      if (!url || typeof url !== 'string') return null;
      try {
        const sref = ref(storage, url);
        const blob = await getBlob(sref);
        return blob && blob.size > 0 ? blob : null;
      } catch (e) {
        console.warn('getSheetBlobFromUrl', e);
        return null;
      }
    }
  };

  // ============================================================
  // SEED (Firestore에 최초 데이터 없으면 생성)
  // ============================================================
  async function seedIfNeeded() {
    const snap = await getDoc(doc(db, 'meta', 'seeded'));
    if (snap.exists()) return;

    const batch = writeBatch(db);

    const users = [
      { uid:'admin1', id:'admin', pw:'1234', name:'약속의 땅 관리자', phone:'010-3440-4318', birth:'19970908', cellId:'c1', role:'admin', status:'active', createdAt:'2026-01-01', profileImg:'', idChangedAt:null }
    ];
    users.forEach(u => batch.set(doc(db,'users',u.uid), u));

    const cells = [
      {id:"c1",name:"김창대목장",leader:"김창대",order:1},
      {id:"c2",name:"김유나목장",leader:"김유나",order:2},
      {id:"c3",name:"김제현목장",leader:"김제현",order:3},
      {id:"c4",name:"김예지목장",leader:"김예지",order:4}
    ];
    cells.forEach(c => batch.set(doc(db,'cells',c.id), c));

    const notices = [
      { id:'n1', title:'동계 수련회 신청 마감 안내', body:'1월 15일(수)까지 신청을 완료해 주세요.\n장소: 양평 수양관\n참가비: 50,000원', by:'admin1', at:'2026-02-20', pinned:true, images:[], eventDate:'2026-01-15', alwaysNotice:false },
      { id:'n2', title:'12월 섬김이 일정 공유', body:'찬양팀·기도팀·안내팀 스케줄이 확정되었습니다.', by:'admin1', at:'2026-02-19', pinned:false, images:[], eventDate:'', alwaysNotice:true },
    ];
    notices.forEach(n => batch.set(doc(db,'notices',n.id), n));

    const bulletins = [
      { id:'b1', title:'2026년 2월 22일 주보', date:'2026-02-22', by:'admin1', at:'2026-02-21',
        order:'1. 예배의 부름\n2. 경배와 찬양\n3. 대표기도\n4. 성경봉독\n5. 말씀 선포\n6. 봉헌\n7. 봉헌기도\n8. 광고(성도의 교제)\n9. 축도',
        announce:'• 동계 수련회 신청 마감: 1월 15일\n• 새가족 환영: 한소망 자매',
        prayer_duty:'정하은', bible_reading:'박민준', offering_duty:'최유진', announcement_duty:'이서연',
        songs:'1. 주님 한 분만으로 (Key: G)\n2. Good Grace (Key: A)\n3. 오직 주만이 (Key: D)' }
    ];
    bulletins.forEach(b => batch.set(doc(db,'bulletins',b.id), b));

    const worships = [
      { id:'w1', date:'2026-02-22', leader:'김창대',
        songs:[
          { title:'주님 한 분만으로', url:'', key:'G', sheet:'' },
          { title:'Good Grace', url:'', key:'A', sheet:'' },
        ],
        by:'admin1', at:'2026-02-20', storedAt:'2026-02-20' }
    ];
    worships.forEach(w => batch.set(doc(db,'worshipSets',w.id), w));

    const events = [
      { id:'e1', title:'주일 청년 예배', date:'2026-02-22', time:'14:00', loc:'본당', cat:'예배' },
      { id:'e2', title:'목장 리더 모임', date:'2026-03-05', time:'19:00', loc:'교육관', cat:'모임' },
    ];
    events.forEach(e => batch.set(doc(db,'events',e.id), e));

    const cellMeetings = [
      { id:'cm1', date:'2026-02-22', verse:'요한복음 15:1-8', verseText:'"나는 포도나무요 너희는 가지라"',
        questions:['오늘 말씀에서 가장 와닿은 부분은 무엇인가요?','이번 주 나의 삶에서 예수님께 더 의지해야 할 부분은?'],
        prayerPersonal:'• 직장에서 말씀대로 살아가게',
        prayerCommunity:'• 우리 목장 모든 지체를 위해\n• 약속의 땅 청년부 부흥을 위해', by:'admin1', at:'2026-02-20' }
    ];
    cellMeetings.forEach(m => batch.set(doc(db,'cellMeetings',m.id), m));

    batch.set(doc(db,'meta','seeded'), { at: new Date().toISOString() });
    await batch.commit();
    console.log('Firestore seeded');
  }

  // ============================================================
  // INIT APP AFTER FIREBASE READY
  // ============================================================
  // Firebase Auth 상태 변화 감지 → 세션을 Firebase가 직접 관리
  // (IndexedDB 기반이라 캐시 삭제에 영향받지 않음)
  onAuthStateChanged(auth, async (firebaseUser) => {
    if (!window._authListenerReady) {
      window._authListenerReady = true;
      window._fbReady = true;
      if (window._appInit) window._appInit(firebaseUser);
    }
  });

  // 5초 이상 Firebase Auth 응답 없으면 로그인 페이지로 폴백
  setTimeout(() => {
    if (!window._authListenerReady) {
      window._authListenerReady = true;
      window._fbReady = true;
      if (window._appInit) window._appInit(null);
    }
  }, 5000);

  // seed는 백그라운드 (앱 시작 블로킹 안 함)
  seedIfNeeded().catch(e => console.warn('seed:', e));
</script>

<div id="app" style="background:#f4f4f5;min-height:100vh;"><div class="fixed-layout"><div class="w-8 h-8 border-2 border-black border-t-transparent rounded-full animate-spin"></div></div></div>

<script>
// ============================================================
// KOREAN PUBLIC HOLIDAYS
// ============================================================
const HOLIDAYS = new Set(['01-01','03-01','05-05','06-06','08-15','10-03','10-09','12-25']);
function isHoliday(ds) { return HOLIDAYS.has(ds.slice(5)); }

// ============================================================
// STATE
// ============================================================
let state = {
  user: null,
  page: 'loading',
  tab: 'home',
  detail: null,
  adminSub: 'dashboard',
  profileOpen: false,
  profilePage: null,

function sanitizeSheetFilename(s) {
  return String(s || '악보').replace(/[/\\?%*:|"<>]/g, '_').trim().slice(0, 120);
}
/** 터치 우선·모바일 UA → 앨범/공유 UX, 그 외 PC → 저장 위치 지정 UX */
function isSheetSaveMobile() {
  try {
    if (window.matchMedia('(pointer: coarse)').matches) return true;
  } catch (e) {}
  return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent || '');
}
function extFromMime(t) {
  const m = (t || '').toLowerCase();
  if (m.includes('png')) return 'png';
  if (m.includes('webp')) return 'webp';
  if (m.includes('jpeg') || m.includes('jpg')) return 'jpg';
  return 'jpg';
}
/** 원격 악보 URL → Blob. Firebase SDK 우선(Storage CORS 미설정 PC에서도 동작하는 경우 많음). URL에 임의 쿼리 붙이지 않음(토큰 URL 보호). */
async function fetchSheetAsBlob(url) {
  if (!url) throw new Error('no url');
  if (window.FDB && typeof window.FDB.getSheetBlobFromUrl === 'function') {
    try {
      const blob = await window.FDB.getSheetBlobFromUrl(url);
      if (blob) return { blob, ext: extFromMime(blob.type) };
    } catch (e) { console.warn('getSheetBlobFromUrl', e); }
  }
  try {
    const res = await fetch(url, { mode: 'cors', credentials: 'omit', cache: 'no-store' });
    if (res.ok) {
      const blob = await res.blob();
      if (blob && blob.size > 0) return { blob, ext: extFromMime(blob.type) };
    }
  } catch (e) { /* 다음 수단 */ }
  try {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    await new Promise((resolve, reject) => {
      img.onload = resolve;
      img.onerror = reject;
      img.src = url;
    });
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    canvas.getContext('2d').drawImage(img, 0, 0);
    const blob = await new Promise((resolve, reject) => {
      canvas.toBlob(b => (b ? resolve(b) : reject(new Error('toBlob'))), 'image/jpeg', 1);
    });
    return { blob, ext: 'jpg' };
  } catch (e) {
    console.warn('fetchSheetAsBlob fallback', e);
  }
  throw new Error('sheet-load-failed');
}
/** PC: 저장 대화상자(또는 브라우저 기본 다운로드). 새 탭 없음 */
async function saveSheetBlobDesktop(blob, baseFilename, ext) {
  const name = sanitizeSheetFilename(baseFilename) + '.' + ext;
  if (window.showSaveFilePicker) {
    const handle = await window.showSaveFilePicker({
      suggestedName: name,
      types: [{ description: '이미지', accept: { 'image/*': ['.jpg', '.jpeg', '.png', '.webp'] } }]
    });
    const w = await handle.createWritable();
    await w.write(blob);
    await w.close();
    return;
  }
  const u = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = u;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(u), 8000);
}
/**
 * 모바일: 공유 시트로「사진에 저장」등 선택 유도(단일). 전체 저장 시에는 파일 다운로드만 연속(공유 N회 방지).
 * 새 탭 없음.
 */
async function saveSheetBlobMobile(blob, baseFilename, ext, opts) {
  const name = sanitizeSheetFilename(baseFilename) + '.' + ext;
  const mime = blob.type || 'image/jpeg';
  const useShare = !opts?.bulk && navigator.canShare;
  if (useShare) {
    try {
      const file = new File([blob], name, { type: mime });
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file] });
        if (!opts?.silent) showToast('저장을 완료했습니다.');
        return;
      }
    } catch (e) {
      if (e.name === 'AbortError') return;
    }
  }
  const u = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = u;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(u), 8000);
  if (!opts?.silent) showToast(opts?.bulk ? '' : '사진첩에 저장했습니다.');
}

async function downloadSheet(url, filename) {
  try {
    const { blob, ext } = await fetchSheetAsBlob(url);
    if (isSheetSaveMobile()) {
      await saveSheetBlobMobile(blob, filename, ext, {});
    } else {
      await saveSheetBlobDesktop(blob, filename, ext);
      showToast('저장했습니다.');
    }
  } catch (e) {
    console.warn('downloadSheet', e);
    showToast('이미지를 불러오거나 저장할 수 없습니다.');

}
/** 전체 악보 저장 */
async function downloadAllSheets(list) {
  if (!list.length) {
    showToast('다운로드할 악보가 없습니다.');
    return;
  }
  if (isSheetSaveMobile()) {
    showToast('악보를 순서대로 저장합니다…');
    let ok = 0;
    for (const s of list) {
      try {
        const { blob, ext } = await fetchSheetAsBlob(s.sheetOrig || s.sheet);
        await saveSheetBlobMobile(blob, (s.title || '악보') + '_악보', ext, { bulk: true, silent: true });
        ok++;
      } catch (e) { console.warn('sheet', e); }
      await new Promise(r => setTimeout(r, 450));
    }
    showToast(ok ? `악보 ${ok}장 저장을 완료했습니다.` : '저장에 실패했습니다.');
    return;
  }
  showToast('악보 파일을 준비하는 중…');
  const items = [];
  for (const s of list) {
    try {
      const { blob, ext } = await fetchSheetAsBlob(s.sheetOrig || s.sheet);
      items.push({ blob, ext, base: (s.title || '악보') + '_악보' });
    } catch (e) { console.warn('sheet', e); }
  }
  if (!items.length) {
    showToast('저장할 악보를 불러오지 못했습니다.');
    return;
  }
  if (window.showDirectoryPicker) {
    try {
      const dir = await window.showDirectoryPicker();
      for (const it of items) {
        const fn = sanitizeSheetFilename(it.base) + '.' + it.ext;
        const fh = await dir.getFileHandle(fn, { create: true });
        const w = await fh.createWritable();
        await w.write(it.blob);
        await w.close();
      }
      showToast(`악보 ${items.length}장을 선택한 폴더에 저장했습니다.`);
      return;
    } catch (e) {
      if (e.name === 'AbortError') return;
    }
  }
  for (const it of items) {
    try {
      await saveSheetBlobDesktop(it.blob, it.base, it.ext);
    } catch (e) {
      console.warn('save desktop', e);
    }
    await new Promise(r => setTimeout(r, 350));
  }
  showToast(`악보 ${items.length}장 저장을 마쳤습니다.`);
}

/** 명부 생년월일(숫자 8자리) → 유효한 월·일 */
function rosterBirthMonthDay(birth) {
  const d = String(birth || '').replace(/\D/g, '');
  if (d.length !== 8) return null;
  const mo = +d.slice(4, 6);
  const day = +d.slice(6, 8);
  if (mo < 1 || mo > 12 || day < 1 || day > 31) return null;
  const y = +d.slice(0, 4);
  const dt = new Date(y, mo - 1, day);
  if (dt.getFullYear() !== y || dt.getMonth() !== mo - 1 || dt.getDate() !== day) return null;
  return { mo, day };
}
/** 특정 연도의 생일 날짜 YYYY-MM-DD (2/29는 평년 2/28) */
function birthdayDateForYear(md, year) {
  let dd = md.day;
  if (md.mo === 2 && dd === 29) {
    const leap = (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
    if (!leap) dd = 28;
  }
  const dt = new Date(year, md.mo - 1, dd);
  if (dt.getMonth() !== md.mo - 1) return null;
  return `${year}-${String(md.mo).padStart(2, '0')}-${String(dd).padStart(2, '0')}`;
}
/** 명부 기준 자동 생일 일정(올해·내년, 가상 문서 — Firestore 미저장) */
function getVirtualBirthdayEventsFromRosters() {
  const rosters = state.cache.rosters || [];
  const out = [];
  const yNow = new Date().getFullYear();
  for (const r of rosters) {
    const name = (r && r.name || '').trim();
    if (!name) continue;
    const md = rosterBirthMonthDay(r.birth);
    if (!md) continue;
    for (const yr of [yNow, yNow + 1]) {
      const ds = birthdayDateForYear(md, yr);
      if (!ds) continue;
      const title = name + ' 생일';
      out.push({
        id: 'vbday_' + r.id + '_' + yr,
        title,
        date: ds,
        time: '',
        loc: '',
        cat: '생일',
        _virtualBirthday: true,
        _rosterId: r.id
      });
    }
  }
  return out;
}
/** 저장된 일정 + 자동 생일(동일 날짜·제목 수동 일정이 있으면 생일 제외) */
function getMergedEventsForDisplay() {
  const real = [...(state.cache.events || [])];
  const virt = getVirtualBirthdayEventsFromRosters();
  const norm = s => String(s || '').replace(/\s/g, '');
  const merged = [...real];
  for (const v of virt) {
    const dup = real.some(e =>
      e.date === v.date &&
      String(e.cat || '') === '생일' &&
      norm(e.title) === norm(v.title)
    );
    if (!dup) merged.push(v);
  }
  merged.sort((a, b) => {
    const c = (a.date || '').localeCompare(b.date || '');
    if (c !== 0) return c;
    return (a.title || '').localeCompare(b.title || '', 'ko');
  });
  return merged;
}
/** 단일 날짜 또는 기간(date~dateEnd) 포함 여부 */
function eventCoversDate(e, ds) {
  if (!e || !ds || !e.date) return false;
  const end = (e.dateEnd && String(e.dateEnd).trim() && e.dateEnd >= e.date) ? e.dateEnd : '';
  if (end) return ds >= e.date && ds <= end;
  return e.date === ds;
}

  return (end || '') >= tday;

/** 일정 기간 문구 (부가 설명용) */
function formatEventDateRangeSubtitle(ev) {
  if (!ev || !ev.date) return '';
  const endStr = (ev.dateEnd && String(ev.dateEnd).trim() && ev.dateEnd > ev.date) ? ev.dateEnd : '';
  if (!endStr) return '';

  const sm = start.getMonth() + 1, sd = start.getDate();

  return sm + '월 ' + sd + '일 ~ ' + em + '월 ' + ed + '일';
}

/** 공지 첨부: 가로 최대 1000px, 품질 0.8 — WebP 우선, 미지원 시 JPEG Blob */
function compressNoticeImageFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const maxW = 1000;
        let w = img.naturalWidth, h = img.naturalHeight;
        if (!w || !h) { reject(new Error('bad-image')); return; }
        if (w > maxW) { h = Math.round((h * maxW) / w); w = maxW; }
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        canvas.toBlob(b => {
          if (b && b.size > 0) { resolve(b); return; }
          canvas.toBlob(b2 => {
            if (b2 && b2.size > 0) resolve(b2);
            else reject(new Error('compress-failed'));
          }, 'image/jpeg', 0.8);
        }, 'image/webp', 0.8);
      };
      img.onerror = () => reject(new Error('img-load'));
      img.src = reader.result;
    };
    reader.onerror = () => reject(reader.error || new Error('read-fail'));
    reader.readAsDataURL(file);
  });
}

// 실시간 리스너 unsubscribe 함수 목록
const _unsubs = [];

function stopListeners() {
  _unsubs.forEach(fn => { try { fn(); } catch(e) {} });
  _unsubs.length = 0;
}

// 여러 onSnapshot이 같은 프레임에 연속으로 발화해도 render는 1회만 실행
let _listenRenderRAF = null;
function _scheduleRenderFromListen() {
  if (_listenRenderRAF !== null) return; // 이미 다음 프레임 예약됨
  _listenRenderRAF = requestAnimationFrame(() => {
    _listenRenderRAF = null;
    render();
  });
}

function listenCol(colName, onData) {
  const unsub = window.FDB.listenCol(colName, docs => {
    onData(docs);
    _scheduleRenderFromListen(); // render() 직접 호출 대신 디바운스 경유
  });
  _unsubs.push(unsub);
}

  listenCol('attendance', docs => {

/** active 유저인데 linkedUid 명부가 없을 때(수동 승인 누락 등) 자동 명부 행 생성 */
async function ensureLinkedRosterForActiveUser() {
  const u = state.user;
  if (!u || u.status !== 'active') return;
  if (state.cache.rosters.some(r => r.linkedUid === u.uid)) return;

  let existing;
  try {
    existing = await window.FDB.getCol('rosters');
  } catch (e) {
    console.warn('ensureLinkedRosterForActiveUser getCol', e);
    return;
  }
  if (!Array.isArray(existing)) return;

  state.cache.rosters = existing.sort((a, b) => koSort(a.name, b.name));
  if (state.cache.rosters.some(r => r.linkedUid === u.uid)) return;

  const rid = uid();
  const roster = {
    id: rid,
    name: u.name || '',
    phone: u.phone || '',
    birth: u.birth || '',
    cellId: u.cellId || '',
    linkedUid: u.uid,
    joined: true
  };
  try {
    await window.FDB.setDoc('rosters', rid, roster);
    state.cache.rosters.push(roster);
    state.cache.rosters.sort((a, b) => koSort(a.name, b.name));
  } catch (e) {
    console.warn('ensureLinkedRosterForActiveUser', e);
  }
}

/** 유튜브 URL에서 비디오 ID(11자)만 추출. 없거나 형식 불일치 시 null */
function getYoutubeVideoId(url) {
  if (url == null || typeof url !== 'string') return null;
  const u = url.trim();
  if (!u) return null;
  let m = u.match(/youtu\.be\/([\w-]{11})(?=[?#&/]|$)/i);
  if (m) return m[1];
  m = u.match(/[?&]v=([\w-]{11})(?=[&#]|$)/i);
  if (m) return m[1];
  m = u.match(/youtube\.com\/(?:embed\/|shorts\/|v\/)([\w-]{11})(?=[?#&/]|$)/i);
  if (m) return m[1];
  return null;
}
// YouTube 썸네일 URL
function getYtThumb(url) {
  const id = getYoutubeVideoId(url);
  return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : null;
}

// DOM morph: 구조가 같으면 바뀐 부분만 교체, 다르면 전체 교체
function morphDOM(container, newHTML) {
  const tmp = document.createElement('div');
  tmp.innerHTML = newHTML;
  const newNodes = Array.from(tmp.childNodes);
  const oldNodes = Array.from(container.childNodes);

  const focused = document.activeElement;
  const focusedId = focused?.id;
  const focusedVal = focused?.value;

  if (newNodes.length === oldNodes.length &&
      newNodes.every((n,i) => n.nodeType === oldNodes[i].nodeType &&
        (n.nodeType !== 1 || n.tagName === oldNodes[i].tagName))) {
    newNodes.forEach((n, i) => {
      if (n.nodeType === 1 && n.outerHTML !== oldNodes[i].outerHTML) {
        oldNodes[i].replaceWith(n);
      }
    });
  } else {
    container.innerHTML = newHTML;
  }

  // 포커스 복원 (검색 input 등)
  if (focusedId) {
    const el = document.getElementById(focusedId);
    if (el && el !== document.activeElement) {
      el.focus();
      if (focusedVal !== undefined && el.tagName === 'INPUT') {
        el.value = focusedVal;
        try { el.setSelectionRange(focusedVal.length, focusedVal.length); } catch(e){}
      }
    }
  }
}

let _renderPending = false;
function render() {
  if (_renderPending) return;
  _renderPending = true;
  requestAnimationFrame(() => { _renderPending = false; _doRender(); });
}
function _doRender() {
  const app = document.getElementById('app');
  let html = '';

  if (state.page === 'loading') {
    html = `<div class="min-h-screen px-5 pt-20 animate-pulse" style="background:#f4f4f5"><div class="flex items-center gap-4 mb-8"><div class="w-10 h-10 bg-zinc-200 rounded-xl"></div><div class="space-y-2"><div class="w-24 h-3 bg-zinc-200 rounded"></div><div class="w-32 h-4 bg-zinc-200 rounded"></div></div></div><div class="w-full h-40 bg-zinc-200 rounded-3xl mb-6"></div><div class="space-y-4"><div class="w-full h-20 bg-zinc-200 rounded-2xl"></div><div class="w-full h-20 bg-zinc-200 rounded-2xl"></div><div class="w-3/4 h-20 bg-zinc-200 rounded-2xl"></div></div></div>`;
  } else if (!state.user) {
    if (state.page === 'register') html = renderRegister();
    else html = renderLogin();
    document.body.classList.add('no-scroll');
  } else {
    document.body.classList.remove('no-scroll');
    if (state.profileOpen) document.body.classList.add('no-scroll');
    if (state.page === 'admin') html = renderAdmin();
    else if (state.profilePage) html = renderProfilePage();
    else if (state.detail) {
      if (state.detail.type === 'bulletin') html = renderBulletinDetail();
      else if (state.detail.type === 'notice') html = renderNoticeDetail();
      else if (state.detail.type === 'worship') html = renderWorshipDetail();
      else html = renderMain();
    } else {
      html = renderMain();
    }
  }

  if (state.profileOpen) html += renderProfileSheet();
  html += renderConfirmModal();
  html += renderCropModal();

  // morph: 가능하면 바뀐 노드만 교체 → 깜빡임/폰트 재로드 없음
  morphDOM(app, html);
  bindEvents();
  bindCropModal();
}

function scheduleEditingReset() {
  state._dirtyResetToken = (state._dirtyResetToken || 0) + 1;
  const t = state._dirtyResetToken;
  queueMicrotask(() => {
    if (state._dirtyResetToken === t) state.isEditing = false;
  });

function setupEditDirtyTracking() {
  const app = document.getElementById('app');
  if (!app || app._dirtyBound) return;
  app._dirtyBound = true;
  const markDirty = e => {
    const el = e.target;
    if (!el || el.closest('#crop-modal')) return;
    const tag = el.tagName;
    if (tag !== 'INPUT' && tag !== 'TEXTAREA' && tag !== 'SELECT') return;
    if (tag === 'INPUT') {
      const t = el.type;
      if (t === 'hidden' || t === 'button' || t === 'submit' || t === 'range') return;
    }
    const id = el.id || '';
    if (id === 'roster-search' || id === 'comment-input') return;
    if (/^att-(yr|mo|wk)$/.test(id) || /^offd-(yr|mo|wk)$/.test(id)) return;
    if (id === 'login-id' || id === 'login-pw' || id.startsWith('reg-')) return;
    state.isEditing = true;
  };
  app.addEventListener('input', markDirty, true);
  app.addEventListener('change', markDirty, true);
}

let _profileSheetClosing = false;
/** 열 때와 대칭으로 딤 페이드아웃 + 시트 슬라이드다운 후 콜백 또는 render */
function closeProfileSheetAnimated(done) {
  if (!state.profileOpen || _profileSheetClosing) {
    if (typeof done === 'function') done();
    else render();
    return;
  }
  const app = document.getElementById('app');
  const overlay = app && app.querySelector('.modal-overlay');
  const sheet = app && app.querySelector('.modal-sheet');
  if (!overlay || !sheet) {
    state.profileOpen = false;
    if (typeof done === 'function') done();
    else render();
    return;
  }
  _profileSheetClosing = true;
  let settled = false;
  const cleanup = () => {
    overlay.removeEventListener('animationend', onOverlayEnd);
    sheet.removeEventListener('animationend', onSheetEnd);
  };
  const finish = () => {
    if (settled) return;
    settled = true;
    cleanup();
    _profileSheetClosing = false;
    state.profileOpen = false;
    if (typeof done === 'function') done();
    else render();
  };
  let overlayDone = false, sheetDone = false;
  const tryFinish = () => { if (overlayDone && sheetDone) finish(); };
  const onOverlayEnd = (ev) => {
    if (ev.target !== overlay || ev.animationName !== 'fadeOut') return;
    overlayDone = true;
    tryFinish();
  };
  const onSheetEnd = (ev) => {
    if (ev.target !== sheet || ev.animationName !== 'sheetDown') return;
    sheetDone = true;
    tryFinish();
  };
  overlay.addEventListener('animationend', onOverlayEnd);
  sheet.addEventListener('animationend', onSheetEnd);
  overlay.classList.remove('anim-fade-in');
  sheet.classList.remove('anim-sheet-up');
  void overlay.offsetWidth;
  overlay.classList.add('anim-fade-out');
  sheet.classList.add('anim-sheet-down');
  setTimeout(() => { if (!settled) { overlayDone = sheetDone = true; finish(); } }, 480);
}

/** 공지 카드·상세에 표시할 일정 문구 (상시 공지 / M월 D일 (요일)) */
function formatNoticeScheduleLabel(n) {
  if (n && n.alwaysNotice) return '상시 공지';
  const d = n && n.eventDate;
  if (d == null || typeof d !== 'string') return '';
  const t = d.trim();
  if (!t) return '';
  const parts = t.split('-');
  if (parts.length !== 3) return t;
  const y = +parts[0], mo = +parts[1], day = +parts[2];
  if (!y || !mo || !day) return t;
  const dt = new Date(y, mo - 1, day);
  if (isNaN(dt.getTime())) return t;
  const wk = ['일', '월', '화', '수', '목', '금', '토'][dt.getDay()];
  return mo + '월 ' + day + '일 (' + wk + ')';
}

function bindNoticeFormScheduleFields() {
  const dateEl = document.getElementById('nf-event-date');
  const alwaysEl = document.getElementById('nf-always-notice');
  if (!dateEl || !alwaysEl) return;
  const sync = () => {
    const on = alwaysEl.checked;
    dateEl.disabled = on;
    dateEl.classList.toggle('opacity-50', on);
    dateEl.classList.toggle('cursor-not-allowed', on);
  };
  alwaysEl.addEventListener('change', sync);
  sync();
}

function renderBulletinInline(b) {
  if (!b) return '';
  let orderItems = b.orderItems || [];
  if (!orderItems.length && b.order) {
    orderItems = String(b.order).split('\n').filter(Boolean).map(line => {
      const m = line.match(/^\d+\.\s*(.+)$/);
      return { name: m ? m[1].trim() : line.trim(), participant: '', scripture: '' };
    });
  }
  let announcements = b.announcements || [];
  if (!announcements.length && b.announce) {
    announcements = String(b.announce).split('\n').filter(s=>s.trim()).map(s=>({ title:s.replace(/^[-\s]*/,'').trim(), body:'' }));
  }
  const dream = b.dream || {};
  const parts = [];

  // 헤더
  parts.push('<div class="bg-gradient-to-br from-zinc-800 to-black shadow-md shadow-zinc-900/20 border border-zinc-700/50 text-white rounded-3xl p-8 text-center relative overflow-hidden dot-pattern mb-4"><div class="absolute inset-0 bg-gradient-to-tr from-white/5 via-transparent to-transparent pointer-events-none rounded-3xl"></div><div class="relative z-10"><p class="text-[10px] font-bold uppercase tracking-[0.3em] text-white/50 mb-2">약속의 땅 청년부 · 주일예배</p><h2 class="text-xl font-bold">' + esc(b.title||b.date) + '</h2></div></div>');

  // 예배순서
  if (orderItems.length) {
    parts.push('<div class="bg-white rounded-3xl overflow-hidden border border-black/[0.04] shadow-[0_4px_20px_-4px_rgba(0,0,0,0.06)] mb-4">');
    parts.push('<div class="px-5 pt-4 pb-3 border-b border-zinc-100 flex items-center gap-2">' + icon('format_list_numbered','text-zinc-400',16) + '<h3 class="text-xs font-bold uppercase tracking-wider text-zinc-400">예배순서</h3></div>');
    parts.push('<div class="divide-y divide-zinc-50">');
    orderItems.forEach(item => {
      parts.push('<div class="flex items-center px-4 py-3 gap-2"><span class="text-sm font-medium text-zinc-500 w-[6.5rem] flex-none">' + esc(item.name) + '</span><span class="flex-1 text-sm font-bold text-black text-center">' + esc(item.scripture||'') + '</span><span class="text-xs text-zinc-500 text-right w-[5rem] flex-none">' + esc(item.participant||'') + '</span></div>');
    });
    parts.push('</div></div>');
  }

  // 광고
  if (announcements.length) {
    parts.push('<div class="bg-white rounded-3xl overflow-hidden border border-black/[0.04] shadow-[0_4px_20px_-4px_rgba(0,0,0,0.06)] mb-4">');
    parts.push('<div class="px-5 pt-4 pb-3 border-b border-zinc-100 flex items-center gap-2">' + icon('campaign','text-zinc-400',16) + '<h3 class="text-xs font-bold uppercase tracking-wider text-zinc-400">광고</h3></div>');
    parts.push('<div class="divide-y divide-zinc-50">');
    announcements.forEach((a,i) => {
      parts.push('<div class="px-5 py-4"><div class="flex items-start gap-2.5"><span class="w-5 h-5 bg-zinc-900 text-white text-[10px] font-bold rounded-full flex items-center justify-center flex-none mt-0.5">'+(i+1)+'</span><div><p class="text-sm font-bold">'+esc(a.title)+'</p>'+(a.body?'<p class="text-xs text-zinc-500 mt-1 leading-relaxed whitespace-pre-line">'+esc(a.body)+'</p>':'')+'</div></div></div>');
    });
    parts.push('</div></div>');
  }

  // 우리의 드림
  if (dream.weekly||dream.tithe||dream.thanks) {
    parts.push('<div class="bg-white rounded-3xl overflow-hidden border border-black/[0.04] shadow-[0_4px_20px_-4px_rgba(0,0,0,0.06)] mb-4">');
    parts.push('<div class="px-5 pt-4 pb-3 border-b border-zinc-100 flex items-center gap-2">' + icon('volunteer_activism','text-zinc-400',16) + '<h3 class="text-xs font-bold uppercase tracking-wider text-zinc-400">우리의 드림</h3></div>');
    parts.push('<div class="p-5 space-y-2">');
    if (dream.weekly) parts.push('<div class="flex justify-between text-sm"><span class="text-zinc-400">주정헌금</span><span class="font-medium">'+(typeof dream.weekly==='number'?dream.weekly.toLocaleString()+'원':esc(String(dream.weekly)))+'</span></div>');
    if (dream.tithe)  parts.push('<div class="flex justify-between text-sm"><span class="text-zinc-400">십일조</span><span class="font-medium">'+(typeof dream.tithe==='number'?dream.tithe.toLocaleString()+'원':esc(String(dream.tithe)))+'</span></div>');
    if (dream.thanks) parts.push('<div class="flex justify-between text-sm"><span class="text-zinc-400">감사헌금</span><span class="font-medium">'+(typeof dream.thanks==='number'?dream.thanks.toLocaleString()+'원':esc(String(dream.thanks)))+'</span></div>');

    parts.push('</div></div>');
  }

  parts.push('<div class="text-center py-2"><p class="text-[10px] text-zinc-300 font-bold uppercase tracking-[0.2em]">약속의 땅 청년부</p></div>');
  return parts.join('');
}

function renderCalendarTab() {
  const merged = getMergedEventsForDisplay();
  const vm = state._calMonth || { y: new Date().getFullYear(), m: new Date().getMonth() };
  const y = vm.y; const m = vm.m;
  const selDate = state._calSel || today();
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const dayLabels = ['일','월','화','수','목','금','토'];
  let cells = '';
  for (let i=0; i<firstDay; i++) cells += '<div></div>';
  for (let d=1; d<=daysInMonth; d++) {
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isSel = ds === selDate;
    const hasEv = merged.some(e => eventCoversDate(e, ds));
    const isToday = ds === today();
    const dow = new Date(ds).getDay();
    const holiday = isHoliday(ds);
    let txtColor = '';
    if (isSel) txtColor = 'text-white';
    else if (dow === 0 || holiday) txtColor = 'text-red-500';
    else if (dow === 6) txtColor = 'text-blue-500';
    let bgColor = '';
    if (isSel) bgColor = 'bg-black';
    else if (isToday) bgColor = 'bg-zinc-100';
    cells += `<button data-cal-date="${ds}" class="relative w-full aspect-square flex items-center justify-center rounded-xl text-sm font-medium transition-colors ${bgColor} ${txtColor} active:opacity-70">${d}${hasEv&&!isSel?`<span class="absolute bottom-1 w-1 h-1 ${(dow===0||holiday)?'bg-red-400':dow===6?'bg-blue-400':'bg-black'} rounded-full"></span>`:''}</button>`;
  }

  const dayEvents = merged.filter(e => eventCoversDate(e, selDate));
  const sd = new Date(selDate);

  return `
  <section>
    <h2 class="text-xl font-bold tracking-tight mb-6">일정</h2>
    <div class="flex items-center justify-between mb-4">
      <button data-action="cal-prev" class="w-8 h-8 flex items-center justify-center rounded-full active:bg-zinc-100">${icon('chevron_left','',20)}</button>
      <h3 class="font-bold text-sm">${y}년 ${m+1}월</h3>
      <button data-action="cal-next" class="w-8 h-8 flex items-center justify-center rounded-full active:bg-zinc-100">${icon('chevron_right','',20)}</button>
    </div>

}

function _renderSongRow(s, i) {

  const thumbInner = yt
    ? ('<img src="' + yt + '" alt="" class="w-full h-full object-cover" loading="lazy" onerror="this.onerror=null;this.src=\'asset/logo.png\';"/>')
    : '<img src="asset/logo.png" alt="" class="w-full h-full object-cover"/>';

    ? '<a href="' + s.url + '" target="_self" class="w-10 h-10 bg-red-50 rounded-xl flex items-center justify-center flex-none shrink-0">' + icon('play_arrow','text-red-500',22) + '</a>'
    : '';
  const sheetBtn = s.sheet
    ? '<button type="button" data-action="toggle-worship-sheet" data-worship-sheet-idx="' + i + '" aria-expanded="false" class="worship-sheet-toggle w-10 h-10 bg-zinc-100 rounded-xl flex items-center justify-center flex-none shrink-0 active:opacity-80">'

    : '';
  const rowActions = (linkBtn || sheetBtn)
    ? '<div class="flex items-center gap-2 flex-none self-center">' + linkBtn + sheetBtn + '</div>'

  const sheetBlock = s.sheet
    ? '<div id="worship-sheet-panel-' + i + '" class="worship-sheet-outer" aria-hidden="true">'
      + '<div class="worship-sheet-inner">'
      + '<div class="mt-3 rounded-2xl overflow-hidden border border-zinc-100">'

      + '<img src="' + s.sheet + '" class="w-full block" loading="lazy"/>'

      + icon('download','text-white',20)
      + '</button></div></div></div></div>'
    : '';
  return '<div class="bg-white rounded-2xl border border-zinc-100 p-3 min-h-[5.75rem]">'
    + '<div class="flex items-stretch gap-3">'
    + '<div class="flex-none w-[7.75rem] aspect-video rounded-xl overflow-hidden bg-zinc-900 border border-zinc-100 shrink-0">' + thumbInner + '</div>'

// 년/월/주차 → YYYY-MM-DD (일요일) 변환
function ymwToDate(yr, mo, wk) {
  const first = new Date(yr, mo-1, 1);
  const firstSun = first.getDay()===0 ? 1 : 8 - first.getDay();
  const day = firstSun + (wk-1)*7;
  return `${yr}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}
// YYYY-MM-DD → {yr, mo, wk}
function dateToYMW(dateStr) {
  if(!dateStr) { const t=new Date(); return {yr:t.getFullYear(),mo:t.getMonth()+1,wk:1}; }
  const d = new Date(dateStr+'T00:00:00');
  const yr = d.getFullYear(), mo = d.getMonth()+1;
  const date = d.getDate(), dow = d.getDay();
  // 이 주의 일요일 날짜 (같은 달 or 이전 달)
  const thisSunDate = date - dow;
  if (thisSunDate <= 0) {
    // 이 주 일요일이 전달 → 전달 기준으로 재계산
    const prevMo = mo === 1 ? 12 : mo - 1;
    const prevYr = mo === 1 ? yr - 1 : yr;
    const lastDayPrev = new Date(yr, mo-1, 0).getDate();
    return dateToYMW(`${prevYr}-${String(prevMo).padStart(2,'0')}-${String(lastDayPrev+thisSunDate).padStart(2,'0')}`);
  }
  const firstDow = new Date(yr, mo-1, 1).getDay();
  const firstSun = firstDow === 0 ? 1 : 8 - firstDow;
  const wk = Math.floor((thisSunDate - firstSun) / 7) + 1;
  return { yr, mo, wk };
}
// 현재 or 최근 일요일 기본값
function defaultYMW() {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  const day = d.getDay();
  const sun = new Date(d.getFullYear(), d.getMonth(), d.getDate() + (day === 0 ? 0 : 7 - day));
  const y = sun.getFullYear();
  const m = String(sun.getMonth() + 1).padStart(2, '0');
  const dt = String(sun.getDate()).padStart(2, '0');
  return dateToYMW(`${y}-${m}-${dt}`);
}
// 년/월/주차 드롭다운 HTML 생성
function ymwSelectors(prefix, yr, mo, wk) {
  const curYr = new Date().getFullYear();
  const yrOpts = [curYr-1,curYr,curYr+1].map(y=>`<option value="${y}"${y===yr?' selected':''}>${y}년</option>`).join('');
  const moOpts = Array.from({length:12},(_,i)=>i+1).map(m=>`<option value="${m}"${m===mo?' selected':''}>${m}월</option>`).join('');
  const wkOpts = [1,2,3,4,5].map(w=>`<option value="${w}"${w===wk?' selected':''}>${w}째주</option>`).join('');
  return `<div class="flex gap-2 mb-4">
    <select id="${prefix}-yr" class="flex-1 px-2.5 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl text-sm focus:outline-none focus:border-black focus:ring-1 focus:ring-inset focus:ring-black">${yrOpts}</select>
    <select id="${prefix}-mo" class="flex-1 px-2.5 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl text-sm focus:outline-none focus:border-black focus:ring-1 focus:ring-inset focus:ring-black">${moOpts}</select>
    <select id="${prefix}-wk" class="flex-1 px-2.5 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl text-sm focus:outline-none focus:border-black focus:ring-1 focus:ring-inset focus:ring-black">${wkOpts}</select>
  </div>`;
}

function getUpcomingSundays(n, startFromNext) {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  const day = d.getDay();
  const thisSunday = new Date(d.getFullYear(), d.getMonth(), d.getDate() + (day === 0 ? 0 : 7 - day));
  thisSunday.setHours(0, 0, 0, 0);
  const start = startFromNext
    ? new Date(thisSunday.getFullYear(), thisSunday.getMonth(), thisSunday.getDate() + 7)
    : thisSunday;
  const result = [];
  for (let i = 0; i < n; i++) {
    const dd = new Date(start.getFullYear(), start.getMonth(), start.getDate() + i * 7);
    const y = dd.getFullYear();
    const m = String(dd.getMonth() + 1).padStart(2, '0');
    const dt = String(dd.getDate()).padStart(2, '0');
    result.push(`${y}-${m}-${dt}`);
  }
  return result;
}

function renderRosterTabs(activeTab, cells, joinCount, withdrawCount) {
  const normalTabs = [{id:'all', name:'전체'}, ...cells.map(c=>({id:c.id, name:c.name}))];
  const specialTabs = [
    {id:'pending_join', name:'가입신청', badge: joinCount, color: 'emerald'},
    {id:'pending_withdraw', name:'탈퇴신청', badge: withdrawCount, color: 'red'},
  ];
  const renderTab = (t) => {
    const isActive = activeTab === t.id;
    const isSpecial = !!t.color;
    let cls = '';
    if (isActive && t.color === 'emerald') cls = 'bg-emerald-500 text-white border-emerald-500';
    else if (isActive && t.color === 'red') cls = 'bg-red-500 text-white border-red-500';
    else if (isActive) cls = 'bg-black text-white border-black';
    else if (t.color === 'emerald') cls = 'bg-emerald-50 text-emerald-600 border-emerald-200';
    else if (t.color === 'red') cls = 'bg-red-50 text-red-500 border-red-200';
    else cls = 'bg-white text-zinc-500 border-zinc-200';
    return `<button data-roster-tab="${t.id}" class="snap-start flex-none flex items-center gap-1 px-3 py-1.5 rounded-full text-xs font-bold border transition-colors ${cls}">${esc(t.name)}${t.badge>0?`<span class="${isActive?'bg-white/30':'bg-red-500'} text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center">${t.badge}</span>`:''}</button>`;
  };
  return `<div class="flex gap-2 mb-4 overflow-x-auto hide-scrollbar pb-1 snap-x snap-mandatory">
    ${normalTabs.map(renderTab).join('')}
    <div class="w-px bg-zinc-200 mx-1 my-1 flex-none"></div>
    ${specialTabs.map(renderTab).join('')}
  </div>`;
}

// 목장 설정 모달 (명부 헤더 톱니바퀴 버튼)
function openCellSettings() {
  const cells = state.cache.cells;
  let overlay = document.getElementById('cell-settings-overlay');
  if (!overlay) { overlay = document.createElement('div'); overlay.id='cell-settings-overlay'; document.body.appendChild(overlay); }
  const renderContent = () => {
    overlay.className = 'fixed inset-0 z-[500] bg-black/50 flex items-end justify-center overlay-scroll-lock';
    overlay.style.touchAction = 'none';
    overlay.innerHTML = `<div class="bg-white rounded-t-3xl w-full max-w-lg shadow-2xl flex flex-col max-h-[min(88vh,720px)]" style="touch-action:none">
      <div class="flex items-center justify-between p-5 pb-3 flex-none border-b border-zinc-100">
        <h3 class="text-base font-bold">목장 설정</h3>
        <button id="cell-set-close" class="w-8 h-8 flex items-center justify-center rounded-full bg-zinc-100">${icon('close','text-zinc-500',18)}</button>
      </div>
      <div class="allow-scroll overflow-y-auto overscroll-contain px-5 pt-3 pb-8 min-h-0 flex-1">
      <button data-cset-action="add-cell" class="w-full py-2.5 border-2 border-dashed border-zinc-200 rounded-2xl text-sm font-bold text-zinc-400 mb-3">+ 목장 추가</button>
      <div id="cset-form-area"></div>
      <div class="space-y-2">${cells.map(cell=>`
        <div class="bg-zinc-50 rounded-2xl p-3">
          <div class="flex items-center justify-between">
            <div><p class="font-bold text-sm">${esc(cell.name)}</p><p class="text-xs text-zinc-400">목자: ${esc(cell.leader)}</p></div>
            <div class="flex gap-1">
              <button data-cset-edit="${cell.id}" class="w-8 h-8 flex items-center justify-center rounded-full active:bg-zinc-200">${icon('edit','text-zinc-400',16)}</button>
              <button data-cset-delete="${cell.id}" class="w-8 h-8 flex items-center justify-center rounded-full active:bg-red-50">${icon('delete','text-red-400',16)}</button>
            </div>
          </div>
          <div id="cset-edit-${cell.id}" class="hidden mt-2 space-y-2">
            <input id="cset-name-${cell.id}" value="${esc(cell.name)}" placeholder="목장 이름" class="w-full px-3 py-2 bg-white border border-zinc-200 rounded-xl text-sm focus:outline-none focus:border-black focus:ring-1 focus:ring-inset focus:ring-black"/>
            <input id="cset-leader-${cell.id}" value="${esc(cell.leader)}" placeholder="목자 이름" class="w-full px-3 py-2 bg-white border border-zinc-200 rounded-xl text-sm focus:outline-none focus:border-black focus:ring-1 focus:ring-inset focus:ring-black"/>
            <button data-cset-save="${cell.id}" class="w-full py-2 bg-gradient-to-br from-zinc-800 to-black shadow-sm shadow-zinc-900/20 border border-zinc-700/30 text-white rounded-xl text-xs font-bold transition-all duration-200 active:scale-[0.97]">저장</button>
          </div>
        </div>
      `).join('')}</div>
      </div>
    </div>`;
    document.getElementById('cell-set-close')?.addEventListener('click', () => overlay.remove());
    overlay.addEventListener('click', e => { if (e.target===overlay) overlay.remove(); });
    // 추가
    overlay.querySelector('[data-cset-action="add-cell"]')?.addEventListener('click', () => {
      const area = document.getElementById('cset-form-area');
      area.innerHTML = `<div class="bg-zinc-50 rounded-2xl p-3 mb-3 space-y-2">
        <input id="new-cell-name" placeholder="목장 이름" class="w-full px-3 py-2 bg-white border border-zinc-200 rounded-xl text-sm focus:outline-none focus:border-black focus:ring-1 focus:ring-inset focus:ring-black"/>
        <input id="new-cell-leader" placeholder="목자 이름" class="w-full px-3 py-2 bg-white border border-zinc-200 rounded-xl text-sm focus:outline-none focus:border-black focus:ring-1 focus:ring-inset focus:ring-black"/>
        <button id="new-cell-save" class="w-full py-2 bg-gradient-to-br from-zinc-800 to-black shadow-sm shadow-zinc-900/20 border border-zinc-700/30 text-white rounded-xl text-xs font-bold transition-all duration-200 active:scale-[0.97]">저장</button>
      </div>`;
      document.getElementById('new-cell-save')?.addEventListener('click', async () => {
        const name = document.getElementById('new-cell-name')?.value.trim();
        const leader = document.getElementById('new-cell-leader')?.value.trim();
        if (!name) return;
        showLoading('저장 중...');
        try {
          const cid = uid();
          const cell = { id:cid, name, leader:leader||'', order: state.cache.cells.length };
          await window.FDB.setDoc('cells', cid, cell);
          state.cache.cells.push(cell);
          overlay.remove(); openCellSettings();
        } finally { hideLoading(); }
      });
    });
    // 편집
    overlay.querySelectorAll('[data-cset-edit]').forEach(btn => {
      btn.addEventListener('click', () => {
        const cid = btn.dataset.csetEdit;
        const el = document.getElementById('cset-edit-'+cid);
        if (el) el.classList.toggle('hidden');
      });
    });
    // 저장
    overlay.querySelectorAll('[data-cset-save]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const cid = btn.dataset.csetSave;
        const name = document.getElementById('cset-name-'+cid)?.value.trim();
        const leader = document.getElementById('cset-leader-'+cid)?.value.trim();
        const cell = state.cache.cells.find(c=>c.id===cid);
        if (!cell || !name) return;
        showLoading('저장 중...');
        try {
          Object.assign(cell, {name, leader:leader||''});
          await window.FDB.setDoc('cells', cid, cell);
          overlay.remove(); openCellSettings();
        } finally { hideLoading(); }
      });
    });
    // 삭제
    overlay.querySelectorAll('[data-cset-delete]').forEach(btn => {
      btn.addEventListener('click', () => {
        const cid = btn.dataset.csetDelete;
        showConfirm('목장을 삭제하시겠습니까?', async () => {
          showLoading('삭제 중...');
          try {
            await window.FDB.deleteDoc('cells', cid);
            state.cache.cells = state.cache.cells.filter(c=>c.id!==cid);
            overlay.remove(); openCellSettings();
          } finally { hideLoading(); }
        });
      });
    });
  };
  renderContent();
}

function bindEvents() {
  // confirm handled by showConfirm DOM direct

  // ── Login ──
  const doLogin = async () => {
    const id = (document.getElementById('login-id')?.value || '').trim();
    const pw = document.getElementById('login-pw')?.value || '';
    const errEl = document.getElementById('login-error');
    const btnEl = document.getElementById('btn-login');
    if (!id || !pw) { errEl.textContent='아이디와 비밀번호를 입력해주세요.'; errEl.classList.remove('hidden'); shakeEls([!id?'login-id':null, !pw?'login-pw':null].filter(Boolean)); return; }
    if (btnEl) { btnEl.disabled=true; }
    errEl.classList.add('hidden');
    showLoading('로그인 중...');
    try {
      const email = id + '@promisedland.com';
      let authCred;
      try {

function openBulletinForm(existing, _forceNew) {
  const area = document.getElementById('admin-form-area'); if (!area) return;
  // _forceNew=true 이면 내용 불러오기지만 새 주보로 처리
  const isEdit = !!existing && !!existing.id && !_forceNew;
  const bid = isEdit ? existing.id : uid();

  // 전도사/목사 찾기
  const ministerPerson = state.cache.rosters.find(r => r.minister === '목사' || r.minister === '전도사');
  const ministerName = ministerPerson?.name || '';

  function getNextSunday() {
    const d = new Date(); const day = d.getDay();
    const sun = new Date(d); sun.setDate(d.getDate() + (day===0?0:7-day)); return sun;
  }
  function weekOfMonth(d) {
    const first = new Date(d.getFullYear(), d.getMonth(), 1);
    return Math.ceil((d.getDate() + first.getDay()) / 7);
  }
  function sundayFromYMW(yr, mo, wk) {
    const first = new Date(yr, mo-1, 1);
    const firstSun = first.getDay()===0 ? 1 : 8 - first.getDay();
    return firstSun + (wk-1)*7;
  }

  const defDate = (isEdit && existing.date) ? new Date(existing.date + 'T00:00:00') : getNextSunday();
  const defYr = defDate.getFullYear();
  const defMo = defDate.getMonth()+1;
  const defWk = weekOfMonth(defDate);

  function getSvc(yr, mo, wk) {
    const day = String(sundayFromYMW(yr,mo,wk)).padStart(2,'0');
    const dateStr = `${yr}-${String(mo).padStart(2,'0')}-${day}`;
    return state.cache.serviceSchedules.find(s=>s.date===dateStr) || {};
  }
  // 이전 주차 계산 (1째주면 전달 마지막 주)
  function prevYMW(yr, mo, wk) {
    if (wk > 1) return { yr, mo, wk: wk - 1 };
    const prevMo = mo === 1 ? 12 : mo - 1;
    const prevYr = mo === 1 ? yr - 1 : yr;
    const lastDay = new Date(prevYr, prevMo, 0).getDate();
    const lastDayDow = new Date(prevYr, prevMo - 1, lastDay).getDay();
    const lastSun = lastDay - lastDayDow;
    const firstDow = new Date(prevYr, prevMo - 1, 1).getDay();
    const firstSun = firstDow === 0 ? 1 : 8 - firstDow;
    return { yr: prevYr, mo: prevMo, wk: Math.floor((lastSun - firstSun) / 7) + 1 };
  }
  let svc = getSvc(defYr, defMo, defWk);

  const oi = existing?.orderItems || [];
  const findOI = (name) => oi.find(x=>x.name===name) || {};
  const existingDream = existing?.dream || {};

  let announcements = isEdit ? (existing.announcements||[]).map(a=>({...a})) : [];

  const bfAnnRowHtml = (i, a) => `
    <div class="bg-zinc-50 rounded-xl p-3 space-y-1.5 mb-2">
      <div class="flex items-center gap-2">
        <span class="text-xs font-bold text-zinc-400 w-4 flex-none">${i + 1}</span>
        <input data-ai="${i}" data-afield="title" value="${esc(a.title || '')}" placeholder="제목"
          class="flex-1 px-2.5 py-2 bg-white border border-zinc-200 rounded-lg text-xs focus:outline-none focus:border-black focus:ring-1 focus:ring-inset focus:ring-black"/>
        <button type="button" data-delann="${i}" class="w-5 h-5 flex items-center justify-center text-zinc-300 flex-none text-xs">✕</button>
      </div>
      <textarea data-ai="${i}" data-afield="body" placeholder="내용 (선택)"
        class="w-full px-2.5 py-1.5 bg-white border border-zinc-200 rounded-lg text-xs focus:outline-none focus:border-black focus:ring-1 focus:ring-inset focus:ring-black resize-none" rows="2">${esc(a.body || '')}</textarea>
    </div>`;
  const renderAnnRows = () => announcements.map((a, i) => bfAnnRowHtml(i, a)).join('');

  // 입력 헬퍼: 담당자 30% / 내용 70% 통일
  const inp = (id, val, ph, wCls='flex-[7]') =>
    `<input id="${id}" value="${esc(val||'')}" placeholder="${ph}"
      class="${wCls} min-w-0 px-2.5 py-2 bg-zinc-50 border border-zinc-200 rounded-lg text-xs focus:outline-none focus:border-black focus:ring-1 focus:ring-inset focus:ring-black"/>`;
  const inpPerson = (id, val, ph='담당자') =>
    `<input id="${id}" value="${esc(val||'')}" placeholder="${ph}"

// ============================================================
// CROP MODAL BINDING
// ============================================================
function bindCropModal() {
  if (!state._cropModal) return;
  const stage = document.getElementById('crop-stage');
  const imgEl = document.getElementById('crop-img');
  const scaleInput = document.getElementById('crop-scale');
  if (!stage || !imgEl) return;

  const SIZE = 240;  // 원 지름
  const STAGE_H = 300;

  // stage 실제 너비 (렌더 후 정확히 알 수 있음)
  const stageRect = stage.getBoundingClientRect();
  const SW = stageRect.width || 360;
  // 원 중심 좌표 (stage 기준)
  const CX = SW / 2;
  const CY = 150; // stage height=300 → cy=150

  // 이미지 최소 크기: 원을 완전히 덮어야 함 (짧은 변 >= SIZE)
  const ensureMinSize = (c) => {
    const minScale = SIZE / Math.min(c.origW, c.origH);
    if (c.w < c.origW * minScale) {
      const s = minScale;
      c.w = c.origW * s;
      c.h = c.origH * s;
    }
  };

  // 이미지가 원을 완전히 덮도록 클램프
  const clamp = (c) => {
    ensureMinSize(c);
    c.ox = Math.min(CX - SIZE/2, Math.max(CX + SIZE/2 - c.w, c.ox));
    c.oy = Math.min(CY - SIZE/2, Math.max(CY + SIZE/2 - c.h, c.oy));
  };

  const applyImg = () => {
    const c = state._cropModal;
    clamp(c);
    imgEl.style.width  = c.w + 'px';
    imgEl.style.height = c.h + 'px';
    imgEl.style.left   = c.ox + 'px';
    imgEl.style.top    = c.oy + 'px';
  };

  // 초기 위치 설정 (처음 열릴 때 ox/oy가 state에 저장됨)
  // 이미 initApp 시 중앙 계산했지만 SW가 실제 달라질 수 있으므로 재계산
  const c0 = state._cropModal;
  ensureMinSize(c0);
  c0.ox = CX - c0.w / 2;
  c0.oy = CY - c0.h / 2;
  applyImg();

  // 슬라이더
  scaleInput?.addEventListener('input', function() {
    const c = state._cropModal;
    const newScale = parseInt(this.value) / 100;
    const newW = c.origW * newScale;
    const newH = c.origH * newScale;
    const ratioX = (CX - c.ox) / c.w;
    const ratioY = (CY - c.oy) / c.h;
    c.ox = CX - ratioX * newW;
    c.oy = CY - ratioY * newH;
    c.w = newW; c.h = newH;
    applyImg();
  });

  // PC 드래그
  let dragging = false, mX, mY, mOX, mOY;
  stage.addEventListener('mousedown', e => {
    dragging = true;
    mX = e.clientX; mY = e.clientY;
    mOX = state._cropModal.ox; mOY = state._cropModal.oy;
    stage.style.cursor = 'grabbing';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    state._cropModal.ox = mOX + (e.clientX - mX);
    state._cropModal.oy = mOY + (e.clientY - mY);
    applyImg();
  });
  document.addEventListener('mouseup', () => {
    dragging = false;
    if (stage) stage.style.cursor = 'grab';
  });
  stage.style.cursor = 'grab';

  // 모바일 터치
  let tOX, tOY, tX, tY;
  let pinchD0 = 0, pinchW0 = 0, pinchH0 = 0, pinchOX0 = 0, pinchOY0 = 0;

  stage.addEventListener('touchstart', e => {
    const c = state._cropModal;
    if (e.touches.length === 1) {
      tX = e.touches[0].clientX; tY = e.touches[0].clientY;
      tOX = c.ox; tOY = c.oy;
    } else if (e.touches.length === 2) {
      const t = e.touches;
      pinchD0 = Math.hypot(t[1].clientX-t[0].clientX, t[1].clientY-t[0].clientY);
      pinchW0 = c.w; pinchH0 = c.h; pinchOX0 = c.ox; pinchOY0 = c.oy;
    }
    e.preventDefault();
  }, { passive: false });

  stage.addEventListener('touchmove', e => {
    const c = state._cropModal;
    if (e.touches.length === 1) {
      c.ox = tOX + (e.touches[0].clientX - tX);
      c.oy = tOY + (e.touches[0].clientY - tY);
      applyImg();
    } else if (e.touches.length === 2) {
      const t = e.touches;
      const dist = Math.hypot(t[1].clientX-t[0].clientX, t[1].clientY-t[0].clientY);
      const ratio = dist / pinchD0;
      const nw = pinchW0 * ratio; const nh = pinchH0 * ratio;
      const pcx = (t[0].clientX + t[1].clientX) / 2 - stage.getBoundingClientRect().left;
      const pcy = (t[0].clientY + t[1].clientY) / 2 - stage.getBoundingClientRect().top;
      c.ox = pcx - (pcx - pinchOX0) / pinchW0 * nw;
      c.oy = pcy - (pcy - pinchOY0) / pinchH0 * nh;
      c.w = nw; c.h = nh;
      if (scaleInput) scaleInput.value = Math.round(nw / c.origW * 100);
      applyImg();
    }
    e.preventDefault();
  }, { passive: false });

  // 완료
  document.getElementById('crop-confirm')?.addEventListener('click', () => {
    const c = state._cropModal;
    const OUT = 100;
    const canvas = document.createElement('canvas');
    canvas.width = OUT; canvas.height = OUT;
    const ctx = canvas.getContext('2d');
    ctx.beginPath();
    ctx.arc(OUT/2, OUT/2, OUT/2, 0, Math.PI*2);
    ctx.clip();
    // 원 안의 이미지 소스 영역 계산
    const srcX = (CX - SIZE/2 - c.ox) * (c.origW / c.w);
    const srcY = (CY - SIZE/2 - c.oy) * (c.origH / c.h);
    const srcW = SIZE * (c.origW / c.w);
    const srcH = SIZE * (c.origH / c.h);
    const imgObj = new Image();
    imgObj.onload = () => {
      ctx.drawImage(imgObj, srcX, srcY, srcW, srcH, 0, 0, OUT, OUT);
      state._pendingProfileImg = canvas.toDataURL('image/jpeg', 0.8);
      state._cropModal = null;
      render();
    };
    imgObj.src = c.src;
  });

  document.getElementById('crop-cancel')?.addEventListener('click', () => {
    state._cropModal = null; state._pendingProfileFile = null; render();
  });
}

// ============================================================
// EVENT DELEGATION — initApp에서 딱 1회만 등록
// data-* 속성 기반 클릭 이벤트를 #app 단 한 곳에서 처리
// ============================================================
function setupDelegation() {
  document.getElementById('app').addEventListener('click', async e => {
    try {
      // ── (1) data-tab ──
      const tabEl = e.target.closest('[data-tab]');
      if (tabEl) {
        const t = tabEl.dataset.tab;
        // Soft Bloom + Icon Bounce 효과
        const bloom = document.createElement('div');
        bloom.className = 'absolute inset-0 bg-zinc-200/50 rounded-full anim-bloom pointer-events-none';
        tabEl.appendChild(bloom);
        setTimeout(() => bloom.remove(), 420);
        const iconEl = tabEl.querySelector('[data-tab-icon]');
        if (iconEl) {
          iconEl.classList.remove('anim-bounce');
          void iconEl.offsetWidth;
          iconEl.classList.add('anim-bounce');
          setTimeout(() => iconEl.classList.remove('anim-bounce'), 320);
        }
        runIfLeaveEditorConfirmed(() => { state.tab = t; state.detail = null; render(); });
        return;
      }

      // ── (2) data-action ──
      const actionEl = e.target.closest('[data-action]');
      if (actionEl) {
        const action = actionEl.dataset.action;
        switch (action) {
          case 'open-profile':  state.profileOpen = true; render(); break;
          case 'close-profile': closeProfileSheetAnimated(); break;
          case 'toggle-worship-sheet': {
            const idx = actionEl.dataset.worshipSheetIdx;
            const panel = document.getElementById('worship-sheet-panel-' + idx);
            if (panel) {
              const open = panel.classList.toggle('is-open');
              panel.setAttribute('aria-hidden', open ? 'false' : 'true');
              actionEl.setAttribute('aria-expanded', open ? 'true' : 'false');
              actionEl.classList.toggle('bg-zinc-100', !open);
              actionEl.classList.toggle('bg-zinc-900', open);
              const ic = actionEl.querySelector('.material-symbols-outlined');
              if (ic) {
                ic.classList.toggle('text-zinc-700', !open);
                ic.classList.toggle('text-white', open);
              }
            }
            break;
          }
          case 'logout': {
            const runLogout = async () => {
              showLoading('로그아웃 중...');
              try {
                await window.FB_signOut().catch(() => {});
                state.user = null; state.page = 'login'; state.profileOpen = false; state.isEditing = false; SESSION.clear(); render();
              } finally { hideLoading(); }
            };
            if (state.profileOpen) closeProfileSheetAnimated(() => { runLogout(); });
            else runLogout();
            break;
          }
          case 'go-admin':
            runIfLeaveEditorConfirmed(() => {
              if (state.profileOpen) {
                closeProfileSheetAnimated(() => {
                  state.page = 'admin';
                  state.adminSub = 'dashboard';
                  render();
                });
              } else {
                state.page = 'admin';
                state.adminSub = 'dashboard';
                render();
              }
            });
            break;
          case 'close-profile-page':
            runIfLeaveEditorConfirmed(() => { state.profilePage = null; render(); });
            break;
          case 'back':
            runIfLeaveEditorConfirmed(() => { state.detail = null; render(); });
            break;
          case 'back-admin':
            runIfLeaveEditorConfirmed(() => {
              if (state.adminSub !== 'dashboard') { state.adminSub = 'dashboard'; render(); }
              else { state.page = 'main'; state.tab = 'home'; render(); }
            });
            break;
          case 'go-worship': state.detail = { type: 'worship', id: 'latest' }; render(); break;
          case 'play-all-songs': {
            const worships = state.cache.worshipSets;
            const set = worships[worships.length - 1];
            if (!set || !Array.isArray(set.songs)) {
              showToast('재생할 찬양이 없습니다.');
              break;
            }
            const ids = [];
            const seen = new Set();
            for (const song of set.songs) {
              const raw = song.url;
              if (raw == null || typeof raw !== 'string') continue;
              const trimmed = raw.trim();
              if (!trimmed) continue;
              const vid = getYoutubeVideoId(trimmed);
              if (vid && !seen.has(vid)) {
                seen.add(vid);
                ids.push(vid);
              }
            }
            if (!ids.length) {
              showToast('유튜브 링크가 있는 곡이 없습니다.');
              break;
            }
            const combinedIds = ids.join(',');
            const openUrl = 'https://www.youtube.com/watch_videos?video_ids=' + combinedIds;
            // iOS Safari에서 새 탭이 뜨고 복귀 시 원치 않는 페이지가 남는 문제를 줄이기 위해
            // 동일 탭에서 이동합니다.
            window.location.href = openUrl;
            break;
          }
          case 'download-all-sheets': {
            const worships = state.cache.worshipSets;
            const w = worships[worships.length - 1];
            const list = (w && w.songs) ? w.songs.filter(s => s.sheetOrig || s.sheet) : [];
            downloadAllSheets(list);
            break;
          }
          case 'cal-prev': {
            const vm = state._calMonth || { y: new Date().getFullYear(), m: new Date().getMonth() };
            vm.m--; if (vm.m < 0) { vm.m = 11; vm.y--; } state._calMonth = { ...vm }; render(); break;
          }
          case 'cal-next': {
            const vm = state._calMonth || { y: new Date().getFullYear(), m: new Date().getMonth() };
            vm.m++; if (vm.m > 11) { vm.m = 0; vm.y++; } state._calMonth = { ...vm }; render(); break;
          }
          case 'toggle-bulletin-list': state._bulletinListOpen = !state._bulletinListOpen; render(); break;
          case 'open-cell-settings': openCellSettings(); break;
          case 'toggle-att': {
            const def = defaultYMW();
            const yr = state._attYr || def.yr, mo = state._attMo || def.mo, wk = state._attWk || def.wk;
            const d = ymwToDate(yr, mo, wk);
            const att = state.cache.attendance;
            if (!att[d]) att[d] = { marks: {} };
            att[d].marks[actionEl.dataset.rid] = !att[d].marks[actionEl.dataset.rid];
            render(); break;
          }
          case 'save-attendance': {
            const def = defaultYMW();
            const yr = state._attYr || def.yr, mo = state._attMo || def.mo, wk = state._attWk || def.wk;
            const d = ymwToDate(yr, mo, wk);
            showLoading('저장 중...');
            try {
              await window.FDB.setDoc('attendance', d, state.cache.attendance[d] || { marks: {} });
              showToast('출석 저장 완료!'); render();
            } finally { hideLoading(); }
            break;
          }
          case 'add-offering': {
            const def = defaultYMW();
            const yr = state._offYr || def.yr, mo = state._offMo || def.mo, wk = state._offWk || def.wk;
            const d = ymwToDate(yr, mo, wk);
            const name = document.getElementById('off-name')?.value.trim();
            const type = document.getElementById('off-type')?.value;
            const amount = Number((document.getElementById('off-amount')?.value || '').replace(/,/g, ''));
            if (!name || !amount) { showToast('이름과 금액을 입력해주세요.'); break; }
            showLoading('저장 중...');
            try {
              const offerings = state.cache.offerings;
              if (!offerings[d]) offerings[d] = { items: [] };
              offerings[d].items.push({ id: uid(), name, type, amount });
              await window.FDB.setDoc('offering', d, offerings[d]); render();
            } finally { hideLoading(); }
            break;
          }
          case 'send-noti': {
            const title = document.getElementById('noti-title')?.value;

            if (!title) break;
            showLoading('발송 중...');
            try {
              const nid = uid();
              const notiData = { id: nid, title, body, type: 'etc', at: today() };
              await window.FDB.setDoc('notifications', nid, notiData);

            } finally { hideLoading(); }

          }
          case 'post-comment': {
            const input = document.getElementById('comment-input');

            const nid = actionEl.dataset.noticeId;

              await window.FDB.setNoticeComment(nid, cid, comment);
              if (!state.cache.comments[nid]) state.cache.comments[nid] = [];
              state.cache.comments[nid].push(comment); input.value = ''; render();
            } finally { hideLoading(); }
            break;
          }
          case 'delete-comment': {
            e.stopPropagation();

            if (!nid || !cid || !state.user) break;

// GLOBAL GESTURES — initApp에서 딱 1회만 등록 (bindEvents 반복 호출로 인한 누수 방지)
// ============================================================
function setupPTR() {
  let startY = 0, pulling = false, indicator = null;
  const threshold = 65;
  const MAX_PULL = 90;

  const SVG_ARROW = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2a10 10 0 1 0 10 10" />
    <polyline points="12 6 12 2 16 2" />
  </svg>`;

  function createIndicator() {
    const el = document.createElement('div');
    el.id = 'ptr-indicator';
    el.style.cssText = 'position:fixed;top:72px;left:50%;transform:translateX(-50%);z-index:9999;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.97);box-shadow:0 4px 24px rgba(0,0,0,0.13);display:flex;align-items:center;justify-content:center;color:#18181b;opacity:0;transition:opacity 0.15s;pointer-events:none;';
    el.innerHTML = '<span class="ptr-icon" style="display:flex;align-items:center;justify-content:center;will-change:transform;">' + SVG_ARROW + '</span>';
    document.body.appendChild(el);
    requestAnimationFrame(() => { if(el.parentNode) el.style.opacity = '1'; });
    return el;
  }

  function removeIndicator() {
    if (!indicator) return;
    const el = indicator; indicator = null;
    el.style.transition = 'opacity 0.25s, transform 0.25s';
    el.style.opacity = '0';
    el.style.transform = 'translateX(-50%) scale(0.8)';
    setTimeout(() => { if(el.parentNode) el.remove(); }, 260);
  }

  document.addEventListener('touchstart', e => {
    if (state.page !== 'main' || state.tab !== 'home' || state.detail || state.profilePage) return;
    if ((window.scrollY || 0) <= 0) { startY = e.touches[0].clientY; pulling = false; }
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (startY === 0) return;
    const dy = e.touches[0].clientY - startY;
    if (dy <= 0) { pulling = false; return; }
    // 10px 이하는 자연 탄성 허용, 초과분만 브라우저 기본동작 차단
    if (dy > 10) e.preventDefault();

    pulling = dy > 8;
    if (pulling && !indicator) indicator = createIndicator();

    if (indicator) {
      const iconEl = indicator.querySelector('.ptr-icon');
      if (iconEl) iconEl.style.transform = `rotate(${Math.min(dy * 2.5, 360)}deg)`;
      indicator.style.color = dy >= threshold ? '#2563eb' : '#18181b';
      indicator.style.boxShadow = dy >= threshold
        ? '0 4px 24px rgba(37,99,235,0.25)'
        : '0 4px 24px rgba(0,0,0,0.13)';
    }
  }, { passive: false });

  document.addEventListener('touchend', async e => {
    if (!pulling) { startY = 0; return; }
    const dy = e.changedTouches[0].clientY - startY;
    pulling = false; startY = 0;

    if (dy >= threshold && indicator) {
      // 무한 스핀 시작
      const iconEl = indicator.querySelector('.ptr-icon');
      if (iconEl) {
        iconEl.style.transform = '';
        iconEl.classList.add('ptr-spinning');
      }
      indicator.style.color = '#2563eb';
      indicator.style.boxShadow = '0 4px 24px rgba(37,99,235,0.2)';
      try { await loadAll(); render(); } finally { removeIndicator(); }
    } else {
      removeIndicator();
    }
  });

  document.addEventListener('touchcancel', () => {
    pulling = false; startY = 0;
    removeIndicator();
  });
}

function setupSwipeBack() {
  let startX = 0, startY = 0, swiping = false;
  const EDGE = 30; // 왼쪽 30px 안에서 시작해야 인식
  document.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    swiping = startX < EDGE;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    if (!swiping) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = Math.abs(e.changedTouches[0].clientY - startY);
    swiping = false;
      if (dx > 60 && dy < 80) {
      // 뒤로가기: 하위 페이지/모달만 닫음, 홈(메인탭)은 스와이프 불가
      if (state.profileOpen) { closeProfileSheetAnimated(); }
      else if (state.detail) { state.detail = null; render(); }
      else if (state.profilePage) { state.profilePage = null; render(); }
      else if (state.page === 'admin' && state.adminSub !== 'dashboard') { state.adminSub = 'dashboard'; render(); }
      else if (state.page === 'admin') { state.page = 'main'; state.tab = 'home'; render(); }
      else if (state.page === 'register') { state.page = 'login'; render(); }
      // 메인 탭 간 스와이프는 의도치 않은 동작 방지를 위해 제거
      // (홈탭에서 스와이프해도 아무 동작 없음)
    }
  });
}

// APP INIT
// ============================================================
let _gesturesSetup = false;
async function initApp(firebaseUser) {
  try {
    // 제스처·이벤트위임 리스너: 앱 생애주기 동안 딱 1회만 등록
    if (!_gesturesSetup) {
      document.addEventListener('touchmove', e => {
        if (document.body.classList.contains('no-scroll') && !e.target.closest('.allow-scroll')) {
          e.preventDefault();
        }
      }, { passive: false });
      setupDelegation();
      setupEditDirtyTracking();
      setupPTR();
      setupSwipeBack();
      _gesturesSetup = true;
    }
    // Firebase Auth가 로그인된 유저를 알고 있으면 → 세션 복원
    // (localStorage가 날아가도 Firebase Auth IndexedDB는 살아있음)
    const session = SESSION.get();
    const hasAuth = !!firebaseUser;
    const hasSession = !!(session && session.uid);

    if (hasAuth || hasSession) {
      if (hasSession) {
        state.user = session;
        try {
          const lc = localStorage.getItem('jmc_cache');
          if (lc) {
            const parsed = JSON.parse(lc);
            if (parsed.users) state.cache.users = parsed.users;
            if (parsed.cells) state.cache.cells = parsed.cells;
            if (parsed.rosters) state.cache.rosters = parsed.rosters;
            if (parsed.bulletins) state.cache.bulletins = parsed.bulletins;
            if (parsed.notices) state.cache.notices = parsed.notices;
          }
        } catch (e) {}
      } else if (firebaseUser) {
        const em = firebaseUser.email || '';
        state.user = {
          uid: firebaseUser.uid,
          name: firebaseUser.displayName || (em ? em.split('@')[0] : '회원'),
          role: 'member',
          status: 'active',
          cellId: '',
          phone: '',
          birth: '',
          profileImg: '',
        };
      }
      // jmc_cache 없거나 Firestore 지연 시에도 로딩 스피너에 갇히지 않도록 메인 껍데기 즉시 표시
      state.page = 'main';
      render();

      await loadAll();

      const lookupUid = firebaseUser?.uid || session?.uid;
      const freshUser = lookupUid ? state.cache.users.find(u => u.uid === lookupUid) : null;

      if (freshUser && freshUser.status === 'active') {
        state.user = freshUser;
        SESSION.set(freshUser);
        state.page = 'main';
        await ensureLinkedRosterForActiveUser();
        // PWA: 이미 권한 있으면 조용히 토큰 등록 (팝업 없음)
        setTimeout(() => { if (typeof window.registerFcmToken === 'function') window.registerFcmToken(); }, 1500);
      } else {
        forceLogoutInvalidSession();
      }
    } else {
      state.page = 'login';
    }
    // 폰트 로딩 완료 후 렌더 (아이콘이 텍스트로 보이는 현상 방지)
    if (document.fonts?.ready) {
      document.fonts.ready.then(() => render()).catch(() => render());
    } else {
      render();
    }
  } catch (e) {
    console.error('initApp', e);
    state.user = null;
    state.page = 'login';
    render();
  }
}

window._appInit = initApp;
if (window._fbReady) initApp();

    if (state.page === 'loading') {
      console.warn('부트 타임아웃: 로그인 화면으로 전환합니다.');
      state.user = null;
      state.page = 'login';
      render();
    }
  } catch (e) {}
}, 12000);
</script>
</body>
</html>
