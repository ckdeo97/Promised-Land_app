async function downloadSheet(url, filename) {
  // canvas를 이용해 이미지를 로컬에 저장 (크로스오리진 우회, 모바일/웹 통합)
  try {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    await new Promise((resolve, reject) => {
      img.onload = resolve;
      img.onerror = reject;
      img.src = url + (url.includes('?') ? '&' : '?') + '_cb=' + Date.now();
    });
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const dataUrl = canvas.toDataURL('image/jpeg', 1.0); // 압축 없이 최고 품질
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = filename + '.jpg';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  } catch(e) {
    // canvas 실패 시 (CORS 등) → fetch blob 시도
    try {
      const res = await fetch(url, { mode: 'cors' });
      const blob = await res.blob();
      const ext = blob.type.includes('png') ? 'png' : 'jpg';
      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = filename + '.' + ext;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);
    } catch(e2) {
      // 최후 수단: 새 탭에서 이미지 열기 (길게 눌러 저장 안내)
      const win = window.open(url, '_blank');
      if (!win) showToast('이미지를 길게 눌러 저장하세요');
      else showToast('이미지를 길게 눌러 저장하세요');
    }
  }
}

async function loadAll() {
  const FDB = window.FDB;
  const [users, cells, rosters, notices, bulletins, worshipSets, events, cellMeetings, serviceSchedules, offeringDocs, attendanceDocs] = await Promise.all([
    FDB.getCol('users'), FDB.getCol('cells'), FDB.getCol('rosters'),
    FDB.getCol('notices'), FDB.getCol('bulletins'), FDB.getCol('worshipSets'),
    FDB.getCol('events'), FDB.getCol('cellMeetings'), FDB.getCol('serviceSchedules'),
    FDB.getCol('offering'), FDB.getCol('attendance')
  ]);
  state.cache.users = users;
  state.cache.cells = cells.sort((a,b)=>(a.order||0)-(b.order||0));
  state.cache.rosters = rosters.sort((a,b)=>koSort(a.name,b.name));
  state.cache.notices = notices.sort((a,b)=>b.at.localeCompare(a.at));
  state.cache.bulletins = bulletins.sort((a,b)=>a.date.localeCompare(b.date));
  state.cache.worshipSets = worshipSets.sort((a,b)=>a.date.localeCompare(b.date));
  state.cache.events = events.sort((a,b)=>a.date.localeCompare(b.date));
  state.cache.serviceSchedules = serviceSchedules.sort((a,b)=>a.date.localeCompare(b.date));
  state.cache.cellMeetings = cellMeetings.sort((a,b)=>b.date.localeCompare(a.date));
  // offerings: { [date]: { items: [...] } } 형태로 변환
  state.cache.offerings = {};
  offeringDocs.forEach(doc => {
    const { id, ...data } = doc;
    state.cache.offerings[id] = data;
  });
  // attendance: { [date]: { marks: {...} } } 형태로 변환
  state.cache.attendance = {};
  attendanceDocs.forEach(doc => {
    const { id, ...data } = doc;
    state.cache.attendance[id] = data;
  });
  // 주요 데이터 localStorage 캐시 저장
  try {
    localStorage.setItem('jmc_cache', JSON.stringify({
      users: state.cache.users,
      cells: state.cache.cells,
      rosters: state.cache.rosters,
      bulletins: state.cache.bulletins,
      notices: state.cache.notices,
    }));
  } catch(e) {}
}

// DOM morph: 구조가 같으면 바뀐 부분만 교체, 다르면 전체 교체
function morphDOM(container, newHTML) {
  const tmp = document.createElement('div');
  tmp.innerHTML = newHTML;
  const newNodes = Array.from(tmp.childNodes);
  const oldNodes = Array.from(container.childNodes);

  const focused = document.activeElement;
  const focusedId = focused?.id;
  const focusedVal = focused?.value;

  if (newNodes.length === oldNodes.length &&
      newNodes.every((n,i) => n.nodeType === oldNodes[i].nodeType &&
        (n.nodeType !== 1 || n.tagName === oldNodes[i].tagName))) {
    newNodes.forEach((n, i) => {
      if (n.nodeType === 1 && n.outerHTML !== oldNodes[i].outerHTML) {
        oldNodes[i].replaceWith(n);
      }
    });
  } else {
    container.innerHTML = newHTML;
  }

  // 포커스 복원 (검색 input 등)
  if (focusedId) {
    const el = document.getElementById(focusedId);
    if (el && el !== document.activeElement) {
      el.focus();
      if (focusedVal !== undefined && el.tagName === 'INPUT') {
        el.value = focusedVal;
        try { el.setSelectionRange(focusedVal.length, focusedVal.length); } catch(e){}
      }
    }
  }
}

// ============================================================
// CALENDAR TAB
// ============================================================
function renderCalendarTab() {
  const events = state.cache.events;
  const vm = state._calMonth || { y: new Date().getFullYear(), m: new Date().getMonth() };
  const y = vm.y; const m = vm.m;
  const selDate = state._calSel || today();
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const dayLabels = ['일','월','화','수','목','금','토'];
  let cells = '';
  for (let i=0; i<firstDay; i++) cells += '<div></div>';
  for (let d=1; d<=daysInMonth; d++) {
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isSel = ds === selDate;
    const hasEv = events.some(e=>e.date===ds);
    const isToday = ds === today();
    const dow = new Date(ds).getDay();
    const holiday = isHoliday(ds);
    let txtColor = '';
    if (isSel) txtColor = 'text-white';
    else if (dow === 0 || holiday) txtColor = 'text-red-500';
    else if (dow === 6) txtColor = 'text-blue-500';
    let bgColor = '';
    if (isSel) bgColor = 'bg-black';
    else if (isToday) bgColor = 'bg-zinc-100';
    cells += `<button data-cal-date="${ds}" class="relative w-full aspect-square flex items-center justify-center rounded-xl text-sm font-medium transition-colors ${bgColor} ${txtColor} active:opacity-70">${d}${hasEv&&!isSel?`<span class="absolute bottom-1 w-1 h-1 ${(dow===0||holiday)?'bg-red-400':dow===6?'bg-blue-400':'bg-black'} rounded-full"></span>`:''}</button>`;
  }

  const dayEvents = events.filter(e => e.date === selDate);
  const sd = new Date(selDate);

  return `
  <section>
    <h2 class="text-xl font-bold tracking-tight mb-6">일정</h2>
    <div class="flex items-center justify-between mb-4">
      <button data-action="cal-prev" class="w-8 h-8 flex items-center justify-center rounded-full active:bg-zinc-100">${icon('chevron_left','',20)}</button>
      <h3 class="font-bold text-sm">${y}년 ${m+1}월</h3>
      <button data-action="cal-next" class="w-8 h-8 flex items-center justify-center rounded-full active:bg-zinc-100">${icon('chevron_right','',20)}</button>
    </div>
    <div class="grid grid-cols-7 gap-1 mb-2">
      ${dayLabels.map((d,i)=>`<div class="text-center text-[10px] font-bold ${i===0?'text-red-400':i===6?'text-blue-400':'text-zinc-400'}">${d}</div>`).join('')}
    </div>
    <div class="grid grid-cols-7 gap-1 mb-7">${cells}</div>
    <div>
      <h3 class="text-sm font-bold mb-3">${sd.getMonth()+1}월 ${sd.getDate()}일 일정</h3>
      ${dayEvents.length===0 ? '<p class="text-sm text-zinc-300 text-center py-8">등록된 일정이 없습니다</p>' :
        `<div class="space-y-2">${dayEvents.map(ev=>`
          <div class="flex items-center gap-4 bg-zinc-50 p-4 rounded-2xl">
            <div class="w-1 h-10 bg-black rounded-full"></div>
            <div>
              <span class="text-[10px] font-bold bg-zinc-200 text-zinc-500 px-1.5 py-0.5 rounded">${ev.cat}</span>
              <h4 class="font-bold text-sm mt-0.5">${ev.title}</h4>
              ${(ev.loc||ev.time)?`<p class="text-xs text-zinc-400">${[ev.loc,ev.time].filter(Boolean).join(' · ')}</p>`:''}
            </div>
          </div>
        `).join('')}</div>`
      }
    </div>
  </section>`;
}

// 년/월/주차 → YYYY-MM-DD (일요일) 변환
function ymwToDate(yr, mo, wk) {
  const first = new Date(yr, mo-1, 1);
  const firstSun = first.getDay()===0 ? 1 : 8 - first.getDay();
  const day = firstSun + (wk-1)*7;
  return `${yr}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}
// YYYY-MM-DD → {yr, mo, wk}
function dateToYMW(dateStr) {
  if(!dateStr) { const t=new Date(); return {yr:t.getFullYear(),mo:t.getMonth()+1,wk:1}; }
  const d = new Date(dateStr+'T00:00:00');
  const first = new Date(d.getFullYear(), d.getMonth(), 1);
  const wk = Math.ceil((d.getDate() + first.getDay()) / 7);
  return {yr:d.getFullYear(), mo:d.getMonth()+1, wk};
}
// 현재 or 최근 일요일 기본값
function defaultYMW() {
  const d = new Date();
  const day = d.getDay();
  const sun = new Date(d); sun.setDate(d.getDate()-(day===0?0:day));
  return dateToYMW(sun.toISOString().split('T')[0]);
}
// 년/월/주차 드롭다운 HTML 생성
function ymwSelectors(prefix, yr, mo, wk) {
  const curYr = new Date().getFullYear();
  const yrOpts = [curYr-1,curYr,curYr+1].map(y=>`<option value="${y}"${y===yr?' selected':''}>${y}년</option>`).join('');
  const moOpts = Array.from({length:12},(_,i)=>i+1).map(m=>`<option value="${m}"${m===mo?' selected':''}>${m}월</option>`).join('');
  const wkOpts = [1,2,3,4,5].map(w=>`<option value="${w}"${w===wk?' selected':''}>${w}째주</option>`).join('');
  return `<div class="flex gap-2 mb-4">
    <select id="${prefix}-yr" class="flex-1 px-2.5 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl text-sm focus:outline-none focus:border-black">${yrOpts}</select>
    <select id="${prefix}-mo" class="flex-1 px-2.5 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl text-sm focus:outline-none focus:border-black">${moOpts}</select>
    <select id="${prefix}-wk" class="flex-1 px-2.5 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl text-sm focus:outline-none focus:border-black">${wkOpts}</select>
  </div>`;
}

function getUpcomingSundays(n, startFromNext) {
  const d = new Date();
  const day = d.getDay(); // 0=일
  // 이번 일요일
  const thisSunday = new Date(d);
  thisSunday.setDate(d.getDate() - day);
  thisSunday.setHours(0,0,0,0);
  const start = startFromNext ? new Date(thisSunday.getTime() + 7*86400000) : thisSunday;
  const result = [];
  for (let i=0; i<n; i++) {
    const dd = new Date(start.getTime() + i*7*86400000);
    result.push(dd.toISOString().split('T')[0]);
  }
  return result;
}

    {id:'pending_withdraw', name:'탈퇴신청', badge: withdrawCount, color: 'red'},

  const renderTab = (t) => {
    const isActive = activeTab === t.id;
    const isSpecial = !!t.color;
    let cls = '';
    if (isActive && t.color === 'emerald') cls = 'bg-emerald-500 text-white border-emerald-500';
    else if (isActive && t.color === 'red') cls = 'bg-red-500 text-white border-red-500';
    else if (isActive) cls = 'bg-black text-white border-black';

  };
  return `<div class="flex gap-2 mb-4 overflow-x-auto hide-scrollbar pb-1">

}

function renderAdminRoster() {
  const rosters = state.cache.rosters;
  const cells = state.cache.cells;
  const users = state.cache.users;
  const activeTab = state.adminRosterTab || 'all';
  const pendingJoin = users.filter(u=>u.status==='pending');
  const pendingWithdraw = users.filter(u=>u.status==='withdraw_pending');

  // 가입신청 탭
  if (activeTab === 'pending_join') {
    return `<h2 class="text-lg font-bold mb-1">명부 관리</h2>
    ${renderRosterTabs(activeTab, cells, pendingJoin.length, pendingWithdraw.length)}
    <div class="space-y-3">${pendingJoin.length ? sortByName(pendingJoin).map(u=>{
      const match = rosters.find(r=>{
        const pd = (u.phone||'').replace(/\D/g,'');
        const rd = (r.phone||'').replace(/\D/g,'');
        return rd && pd && rd===pd;
      });
      return `<div class="bg-white p-4 rounded-2xl border border-zinc-100">
        <div class="flex items-center justify-between mb-2">
          <div><p class="font-bold text-sm">${u.name}</p><p class="text-xs text-zinc-400">${fmtPhone(u.phone)} · ${fmtDate(u.birth)}</p></div>
          <button data-action="approve" data-uid="${u.uid}" class="px-4 py-2 bg-black text-white rounded-xl text-xs font-bold">승인</button>

        ${match?`<p class="text-[10px] text-emerald-600 bg-emerald-50 px-2 py-1 rounded-lg inline-block">📋 명부 매칭: ${match.name}</p>`:`<p class="text-[10px] text-zinc-400 bg-zinc-50 px-2 py-1 rounded-lg inline-block">명부 미등록</p>`}
      </div>`;
    }).join('') : '<p class="text-sm text-zinc-400 text-center py-10">대기 중인 가입 신청이 없습니다.</p>'}</div>`;
  }

  // 탈퇴신청 탭
  if (activeTab === 'pending_withdraw') {
    return `<h2 class="text-lg font-bold mb-1">명부 관리</h2>
    ${renderRosterTabs(activeTab, cells, pendingJoin.length, pendingWithdraw.length)}
    <div class="space-y-3">${pendingWithdraw.length ? sortByName(pendingWithdraw).map(u=>`

        </div>
      </div>`).join('') : '<p class="text-sm text-zinc-400 text-center py-10">대기 중인 탈퇴 신청이 없습니다.</p>'}</div>`;
  }

  // 일반 명부 탭 - 명부 + 명부없는 가입자 합산
  const activeUsers = users.filter(u=>u.status==='active');

// 목장 설정 모달 (명부 헤더 톱니바퀴 버튼)
function openCellSettings() {
  const cells = state.cache.cells;
  let overlay = document.getElementById('cell-settings-overlay');
  if (!overlay) { overlay = document.createElement('div'); overlay.id='cell-settings-overlay'; document.body.appendChild(overlay); }
  const renderContent = () => {
    overlay.className = 'fixed inset-0 z-[500] bg-black/50 flex items-end justify-center';
    overlay.innerHTML = `<div class="bg-white rounded-t-3xl w-full max-w-lg p-5 pb-8 shadow-2xl">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-base font-bold">목장 설정</h3>
        <button id="cell-set-close" class="w-8 h-8 flex items-center justify-center rounded-full bg-zinc-100">${icon('close','text-zinc-500',18)}</button>
      </div>
      <button data-cset-action="add-cell" class="w-full py-2.5 border-2 border-dashed border-zinc-200 rounded-2xl text-sm font-bold text-zinc-400 mb-3">+ 목장 추가</button>
      <div id="cset-form-area"></div>
      <div class="space-y-2">${cells.map(cell=>`
        <div class="bg-zinc-50 rounded-2xl p-3">
          <div class="flex items-center justify-between">
            <div><p class="font-bold text-sm">${cell.name}</p><p class="text-xs text-zinc-400">목자: ${cell.leader}</p></div>
            <div class="flex gap-1">
              <button data-cset-edit="${cell.id}" class="w-8 h-8 flex items-center justify-center rounded-full active:bg-zinc-200">${icon('edit','text-zinc-400',16)}</button>
              <button data-cset-delete="${cell.id}" class="w-8 h-8 flex items-center justify-center rounded-full active:bg-red-50">${icon('delete','text-red-400',16)}</button>
            </div>
          </div>
          <div id="cset-edit-${cell.id}" class="hidden mt-2 space-y-2">
            <input id="cset-name-${cell.id}" value="${cell.name}" placeholder="목장 이름" class="w-full px-3 py-2 bg-white border border-zinc-200 rounded-xl text-sm focus:outline-none focus:border-black"/>
            <input id="cset-leader-${cell.id}" value="${cell.leader}" placeholder="목자 이름" class="w-full px-3 py-2 bg-white border border-zinc-200 rounded-xl text-sm focus:outline-none focus:border-black"/>
            <button data-cset-save="${cell.id}" class="w-full py-2 bg-black text-white rounded-xl text-xs font-bold">저장</button>
          </div>
        </div>
      `).join('')}</div>
    </div>`;
    document.getElementById('cell-set-close')?.addEventListener('click', () => overlay.remove());
    overlay.addEventListener('click', e => { if (e.target===overlay) overlay.remove(); });
    // 추가
    overlay.querySelector('[data-cset-action="add-cell"]')?.addEventListener('click', () => {
      const area = document.getElementById('cset-form-area');
      area.innerHTML = `<div class="bg-zinc-50 rounded-2xl p-3 mb-3 space-y-2">
        <input id="new-cell-name" placeholder="목장 이름" class="w-full px-3 py-2 bg-white border border-zinc-200 rounded-xl text-sm focus:outline-none focus:border-black"/>
        <input id="new-cell-leader" placeholder="목자 이름" class="w-full px-3 py-2 bg-white border border-zinc-200 rounded-xl text-sm focus:outline-none focus:border-black"/>
        <button id="new-cell-save" class="w-full py-2 bg-black text-white rounded-xl text-xs font-bold">저장</button>
      </div>`;
      document.getElementById('new-cell-save')?.addEventListener('click', async () => {
        const name = document.getElementById('new-cell-name')?.value.trim();
        const leader = document.getElementById('new-cell-leader')?.value.trim();
        if (!name) return;
        const cid = uid();
        const cell = { id:cid, name, leader:leader||'', order: state.cache.cells.length };
        await window.FDB.setDoc('cells', cid, cell);
        state.cache.cells.push(cell);
        overlay.remove(); openCellSettings();
      });
    });
    // 편집
    overlay.querySelectorAll('[data-cset-edit]').forEach(btn => {
      btn.addEventListener('click', () => {
        const cid = btn.dataset.csetEdit;
        const el = document.getElementById('cset-edit-'+cid);
        if (el) el.classList.toggle('hidden');
      });
    });
    // 저장
    overlay.querySelectorAll('[data-cset-save]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const cid = btn.dataset.csetSave;
        const name = document.getElementById('cset-name-'+cid)?.value.trim();
        const leader = document.getElementById('cset-leader-'+cid)?.value.trim();
        const cell = state.cache.cells.find(c=>c.id===cid);
        if (!cell || !name) return;
        Object.assign(cell, {name, leader:leader||''});
        await window.FDB.setDoc('cells', cid, cell);
        overlay.remove(); openCellSettings();
      });
    });
    // 삭제
    overlay.querySelectorAll('[data-cset-delete]').forEach(btn => {
      btn.addEventListener('click', () => {
        const cid = btn.dataset.csetDelete;
        showConfirm('목장을 삭제하시겠습니까?', async () => {
          await window.FDB.deleteDoc('cells', cid);
          state.cache.cells = state.cache.cells.filter(c=>c.id!==cid);
          overlay.remove(); openCellSettings();
        });
      });
    });
  };
  renderContent();
}

// ============================================================
// EVENT BINDING
// ============================================================
function bindEvents() {
  // ── Pull to Refresh ──
  (function setupPTR() {
    let startY = 0, pulling = false, indicator = null;
    const threshold = 70;
    const mainEl = () => document.querySelector('main') || document.querySelector('.min-h-screen');

    document.addEventListener('touchstart', e => {
      // 홈탭에서만 PTR 동작
      if (state.page !== 'main' || state.tab !== 'home' || state.detail || state.profilePage) return;
      const scrollTop = window.scrollY || 0;
      if (scrollTop <= 0) { startY = e.touches[0].clientY; pulling = true; }
    }, { passive: true });

    document.addEventListener('touchmove', e => {
      if (!pulling) return;
      const dy = e.touches[0].clientY - startY;
      if (dy > 10 && !indicator) {
        indicator = document.createElement('div');
        indicator.id = 'ptr-indicator';
        indicator.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:9999;background:#000;color:#fff;padding:6px 16px;border-radius:999px;font-size:12px;font-weight:700;opacity:0;transition:opacity 0.2s;pointer-events:none;';
        indicator.textContent = '↓ 당겨서 새로고침';
        document.body.appendChild(indicator);
        setTimeout(() => { if(indicator) indicator.style.opacity = '1'; }, 10);
      }
      if (indicator && dy > threshold) indicator.textContent = '↑ 놓으면 새로고침';
      else if (indicator) indicator.textContent = '↓ 당겨서 새로고침';
    }, { passive: true });

    document.addEventListener('touchend', async e => {
      if (!pulling) return;
      pulling = false;
      const dy = e.changedTouches[0].clientY - startY;
      if (indicator) { indicator.style.opacity = '0'; setTimeout(() => { indicator?.remove(); indicator = null; }, 200); }
      if (dy > threshold) {
        showToast('새로고침 중...');
        await loadAll();
        render();
      }
    });
  })();

  // confirm handled by showConfirm DOM direct

  // ── Login ──
  const doLogin = async () => {
    const id = (document.getElementById('login-id')?.value || '').trim();
    const pw = document.getElementById('login-pw')?.value || '';
    const errEl = document.getElementById('login-error');
    const btnEl = document.getElementById('btn-login');
    if (!id || !pw) { errEl.textContent='아이디와 비밀번호를 입력해주세요.'; errEl.classList.remove('hidden'); return; }
    if (btnEl) { btnEl.textContent='로그인 중...'; btnEl.disabled=true; }
    errEl.classList.add('hidden');
    try {
      // 1) Firestore에서 아이디로 사용자 찾기
      const allUsers = await window.FDB.getCol('users');
      const u = allUsers.find(x => x.id === id);
      if (!u) { errEl.textContent='아이디 또는 비밀번호가 틀렸습니다.'; errEl.classList.remove('hidden'); return; }
      if (u.status === 'pending') { errEl.textContent='관리자 승인 대기 중입니다.'; errEl.classList.remove('hidden'); return; }
      if (u.status === 'withdraw_pending') { errEl.textContent='탈퇴 신청 중인 계정입니다.'; errEl.classList.remove('hidden'); return; }

      // 2) Firebase Auth로 실제 인증 (ID@promisedland.com)
      const email = id + '@promisedland.com';
      try {
        await window.FB_signIn(email, pw);
      } catch(authErr) {
        // Auth 계정 없거나 비번 틀림 → 레거시 pw 필드 폴백 (마이그레이션 기간)
        if (u.pw && u.pw === pw) {
          // 최초 로그인 시 Auth 계정 생성 (마이그레이션)
          try {
            await window.FB_createUser(email, pw);
            // pw 필드 제거 (보안)
            await window.FDB.setDoc('users', u.uid, { pw: null });
            u.pw = null;
          } catch(createErr) {
            if (createErr.code !== 'auth/email-already-in-use') throw createErr;
            // 이미 있으면 비번이 다른 것 → 오류
            errEl.textContent='비밀번호가 틀렸습니다.'; errEl.classList.remove('hidden'); return;
          }
        } else {
          errEl.textContent='아이디 또는 비밀번호가 틀렸습니다.'; errEl.classList.remove('hidden'); return;
        }
      }

      state.user = u; state.page = 'main';

  (function setupSwipeBack() {
    let startX = 0, startY = 0, swiping = false;
    const EDGE = 30; // 왼쪽 30px 안에서 시작해야 인식
    document.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      swiping = startX < EDGE;
    }, { passive: true });
    document.addEventListener('touchend', e => {
      if (!swiping) return;
      const dx = e.changedTouches[0].clientX - startX;
      const dy = Math.abs(e.changedTouches[0].clientY - startY);
      swiping = false;
      if (dx > 60 && dy < 80) {
        // 뒤로가기: 하위 페이지/모달만 닫음, 홈(메인탭)은 스와이프 불가
        if (state.detail) { state.detail = null; render(); }

        else if (state.page === 'admin' && state.adminSub !== 'dashboard') { state.adminSub = 'dashboard'; render(); }

      }
    });
  })();

    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const origW = img.naturalWidth; const origH = img.naturalHeight;
        const SIZE = 240; // 원 지름
        const STAGE_H = 300; // stage 높이
        const STAGE_W = Math.min(window.innerWidth - 32, 384); // max-w-sm ≈384px, padding 32px
        // 이미지를 원(240px)보다 크게 초기화 (짧은 변 기준)
        const aspect = origW / origH;
        let w, h;
        if (aspect >= 1) { h = SIZE; w = SIZE * aspect; }
        else             { w = SIZE; h = SIZE / aspect; }
        // 중앙 배치: stage 중심 = 원 중심 (cx=STAGE_W/2, cy=150)
        const ox = STAGE_W/2 - w/2;
        const oy = 150 - h/2;
        state._cropModal = { src:e.target.result, origW, origH, w, h, ox, oy };
        state._pendingProfileFile = file;
        render();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });

      const idx = state.cache.serviceSchedules.findIndex(s=>s.date===date);
      if (idx>=0) state.cache.serviceSchedules[idx] = data;
      else state.cache.serviceSchedules.push(data);
    }
    showToast('임사 저장 완료!');
  });
}

function openBulletinForm(existing) {
  const area = document.getElementById('admin-form-area'); if (!area) return;
  const isEdit = !!existing;
  const bid = isEdit ? existing.id : uid();

  // 전도사/목사 찾기
  const ministerPerson = state.cache.rosters.find(r => r.minister === '목사' || r.minister === '전도사');
  const ministerName = ministerPerson?.name || '';

  function getNextSunday() {
    const d = new Date(); const day = d.getDay();
    const sun = new Date(d); sun.setDate(d.getDate() + (day===0?0:7-day)); return sun;
  }
  function weekOfMonth(d) {
    const first = new Date(d.getFullYear(), d.getMonth(), 1);
    return Math.ceil((d.getDate() + first.getDay()) / 7);
  }
  function sundayFromYMW(yr, mo, wk) {
    const first = new Date(yr, mo-1, 1);
    const firstSun = first.getDay()===0 ? 1 : 8 - first.getDay();
    return firstSun + (wk-1)*7;
  }

  const defDate = isEdit && existing.date ? new Date(existing.date + 'T00:00:00') : getNextSunday();
  const defYr = defDate.getFullYear();
  const defMo = defDate.getMonth()+1;
  const defWk = weekOfMonth(defDate);

  function getSvc(yr, mo, wk) {
    const day = String(sundayFromYMW(yr,mo,wk)).padStart(2,'0');
    const dateStr = `${yr}-${String(mo).padStart(2,'0')}-${day}`;
    return state.cache.serviceSchedules.find(s=>s.date===dateStr) || {};

// ============================================================
// CROP MODAL BINDING
// ============================================================
function bindCropModal() {
  if (!state._cropModal) return;
  const stage = document.getElementById('crop-stage');
  const imgEl = document.getElementById('crop-img');
  const scaleInput = document.getElementById('crop-scale');
  if (!stage || !imgEl) return;

  const SIZE = 240;  // 원 지름
  const STAGE_H = 300;

  // stage 실제 너비 (렌더 후 정확히 알 수 있음)
  const stageRect = stage.getBoundingClientRect();
  const SW = stageRect.width || 360;
  // 원 중심 좌표 (stage 기준)
  const CX = SW / 2;
  const CY = 150; // stage height=300 → cy=150

  // 이미지 최소 크기: 원을 완전히 덮어야 함 (짧은 변 >= SIZE)
  const ensureMinSize = (c) => {
    const minScale = SIZE / Math.min(c.origW, c.origH);
    if (c.w < c.origW * minScale) {
      const s = minScale;
      c.w = c.origW * s;
      c.h = c.origH * s;
    }
  };

  // 이미지가 원을 완전히 덮도록 클램프
  const clamp = (c) => {
    ensureMinSize(c);
    c.ox = Math.min(CX - SIZE/2, Math.max(CX + SIZE/2 - c.w, c.ox));
    c.oy = Math.min(CY - SIZE/2, Math.max(CY + SIZE/2 - c.h, c.oy));
  };

  const applyImg = () => {
    const c = state._cropModal;
    clamp(c);
    imgEl.style.width  = c.w + 'px';
    imgEl.style.height = c.h + 'px';
    imgEl.style.left   = c.ox + 'px';
    imgEl.style.top    = c.oy + 'px';
  };

  // 초기 위치 설정 (처음 열릴 때 ox/oy가 state에 저장됨)
  // 이미 initApp 시 중앙 계산했지만 SW가 실제 달라질 수 있으므로 재계산
  const c0 = state._cropModal;
  ensureMinSize(c0);
  c0.ox = CX - c0.w / 2;
  c0.oy = CY - c0.h / 2;
  applyImg();

  // 슬라이더
  scaleInput?.addEventListener('input', function() {
    const c = state._cropModal;
    const newScale = parseInt(this.value) / 100;
    const newW = c.origW * newScale;
    const newH = c.origH * newScale;
    const ratioX = (CX - c.ox) / c.w;
    const ratioY = (CY - c.oy) / c.h;
    c.ox = CX - ratioX * newW;
    c.oy = CY - ratioY * newH;
    c.w = newW; c.h = newH;
    applyImg();
  });

  // PC 드래그
  let dragging = false, mX, mY, mOX, mOY;
  stage.addEventListener('mousedown', e => {
    dragging = true;
    mX = e.clientX; mY = e.clientY;
    mOX = state._cropModal.ox; mOY = state._cropModal.oy;
    stage.style.cursor = 'grabbing';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    state._cropModal.ox = mOX + (e.clientX - mX);
    state._cropModal.oy = mOY + (e.clientY - mY);
    applyImg();
  });
  document.addEventListener('mouseup', () => {
    dragging = false;
    if (stage) stage.style.cursor = 'grab';
  });
  stage.style.cursor = 'grab';

  // 모바일 터치
  let tOX, tOY, tX, tY;
  let pinchD0 = 0, pinchW0 = 0, pinchH0 = 0, pinchOX0 = 0, pinchOY0 = 0;

  stage.addEventListener('touchstart', e => {
    const c = state._cropModal;
    if (e.touches.length === 1) {
      tX = e.touches[0].clientX; tY = e.touches[0].clientY;
      tOX = c.ox; tOY = c.oy;
    } else if (e.touches.length === 2) {
      const t = e.touches;
      pinchD0 = Math.hypot(t[1].clientX-t[0].clientX, t[1].clientY-t[0].clientY);
      pinchW0 = c.w; pinchH0 = c.h; pinchOX0 = c.ox; pinchOY0 = c.oy;
    }
    e.preventDefault();
  }, { passive: false });

  stage.addEventListener('touchmove', e => {
    const c = state._cropModal;
    if (e.touches.length === 1) {
      c.ox = tOX + (e.touches[0].clientX - tX);
      c.oy = tOY + (e.touches[0].clientY - tY);
      applyImg();
    } else if (e.touches.length === 2) {
      const t = e.touches;
      const dist = Math.hypot(t[1].clientX-t[0].clientX, t[1].clientY-t[0].clientY);
      const ratio = dist / pinchD0;
      const nw = pinchW0 * ratio; const nh = pinchH0 * ratio;
      const pcx = (t[0].clientX + t[1].clientX) / 2 - stage.getBoundingClientRect().left;
      const pcy = (t[0].clientY + t[1].clientY) / 2 - stage.getBoundingClientRect().top;
      c.ox = pcx - (pcx - pinchOX0) / pinchW0 * nw;
      c.oy = pcy - (pcy - pinchOY0) / pinchH0 * nh;
      c.w = nw; c.h = nh;
      if (scaleInput) scaleInput.value = Math.round(nw / c.origW * 100);
      applyImg();
    }
    e.preventDefault();
  }, { passive: false });

  // 완료
  document.getElementById('crop-confirm')?.addEventListener('click', () => {
    const c = state._cropModal;
    const OUT = 400;
    const canvas = document.createElement('canvas');
    canvas.width = OUT; canvas.height = OUT;
    const ctx = canvas.getContext('2d');
    ctx.beginPath();
    ctx.arc(OUT/2, OUT/2, OUT/2, 0, Math.PI*2);
    ctx.clip();
    // 원 안의 이미지 소스 영역 계산
    const srcX = (CX - SIZE/2 - c.ox) * (c.origW / c.w);
    const srcY = (CY - SIZE/2 - c.oy) * (c.origH / c.h);
    const srcW = SIZE * (c.origW / c.w);
    const srcH = SIZE * (c.origH / c.h);
    const imgObj = new Image();
    imgObj.onload = () => {
      ctx.drawImage(imgObj, srcX, srcY, srcW, srcH, 0, 0, OUT, OUT);
      state._pendingProfileImg = canvas.toDataURL('image/jpeg', 0.9);
      state._cropModal = null;
      render();
    };
    imgObj.src = c.src;
  });

  document.getElementById('crop-cancel')?.addEventListener('click', () => {
    state._cropModal = null; state._pendingProfileFile = null; render();
  });
}

// ============================================================
// APP INIT
// ============================================================
async function initApp(firebaseUser) {
  // Firebase Auth가 로그인된 유저를 알고 있으면 → 세션 복원
  // (localStorage가 날아가도 Firebase Auth IndexedDB는 살아있음)
  const session = SESSION.get();
  const hasAuth = !!firebaseUser;
  const hasSession = !!(session && session.uid);

  if (hasAuth || hasSession) {
    // 로컬 캐시로 즉시 렌더링 (Firebase 로드 전)
    if (hasSession) {
      state.user = session;
      try {
        const lc = localStorage.getItem('jmc_cache');
        if (lc) {
          const parsed = JSON.parse(lc);
          if (parsed.users) state.cache.users = parsed.users;
          if (parsed.cells) state.cache.cells = parsed.cells;
          if (parsed.rosters) state.cache.rosters = parsed.rosters;
          if (parsed.bulletins) state.cache.bulletins = parsed.bulletins;
          if (parsed.notices) state.cache.notices = parsed.notices;
          state.page = 'main';
          render(); // 캐시 데이터로 즉시 표시
        }
      } catch(e) {}
    }

    await loadAll();

    // Firebase Auth UID로 유저 찾기 (localStorage session 날아간 경우 복원)
    const lookupUid = firebaseUser?.uid || session?.uid;
    const freshUser = state.cache.users.find(u => u.uid === lookupUid);
    if (freshUser) {
      state.user = freshUser;
      SESSION.set(freshUser); // localStorage에 다시 저장
    } else if (!hasSession && hasAuth) {
      // Firebase Auth는 있지만 앱 유저 데이터 없음 → 재가입 필요 안 내보내고 로그인 페이지
      state.page = 'login';
      render();
      return;
    }

    state.page = 'main';
  } else {
    state.page = 'login';
  }
  render();
}

window._appInit = initApp;
if (window._fbReady) initApp();
</script>
